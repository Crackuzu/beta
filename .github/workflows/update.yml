name: Update Games Database

on:
  workflow_dispatch:
    # Trigger manuel depuis l'interface GitHub uniquement
    # (le cron sera réactivé plus tard quand la base sera complète)

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # nécessaire pour git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        env:
          STEAMGRIDDB_API_KEY: ${{ secrets.STEAMGRIDDB_API_KEY }}
          IGDB_CLIENT_ID:      ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET:  ${{ secrets.IGDB_CLIENT_SECRET }}
        run: node scripts/update.js

      - name: Commit & push si changements
        run: |
          git config user.email "bot@crackuzu.github"
          git config user.name "CrackUZU Bot"
          git add data.json ambiguous.json || true
          git diff --staged --quiet || git commit -m "chore: update games database [$(date -u +'%Y-%m-%d %H:%M')] 🎮"
          git push
