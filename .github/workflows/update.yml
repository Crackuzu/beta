name: Update Games Database

on:
  workflow_dispatch:
    # Déclenchement manuel uniquement

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 heures maximum (sécurité)
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        env:
          STEAMGRIDDB_API_KEY: ${{ secrets.STEAMGRIDDB_API_KEY }}
          IGDB_CLIENT_ID: ${{ secrets.IGDB_CLIENT_ID }}
          IGDB_CLIENT_SECRET: ${{ secrets.IGDB_CLIENT_SECRET }}
        run: node scripts/update.js

      - name: Commit & push si changements
        run: |
          git config user.email "bot@crackuzu.github"
          git config user.name "CrackUZU Bot"
          git add data.json ambiguous.json progress.json || true
          git diff --staged --quiet || git commit -m "chore: update games database [$(date -u +'%Y-%m-%d %H:%M')] 🎮"
          git push || echo "No changes to push"
