name: Clean data.json

on:
  workflow_dispatch:

jobs:
  clean:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # Debug (tu peux enlever après)
      - name: Debug files
        run: ls -R

      - name: Run cleaner
        run: node clean.js

      - name: Commit changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data.json
          git commit -m "Clean game names" || echo "No changes to commit"
          git push
