name: Update data.json

on:
  repository_dispatch:
    types: [update-data]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Vérifier le Discord ID ──────────────────────────────────────────
      - name: Check Discord ID
        run: |
          DISCORD_ID="${{ github.event.client_payload.discord_id }}"
          ALLOWED="482466285364576266"
          if [ "$DISCORD_ID" != "$ALLOWED" ]; then
            echo "❌ Discord ID non autorisé : $DISCORD_ID"
            exit 1
          fi
          echo "✅ Discord ID autorisé : $DISCORD_ID"

      # ── 2. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 3. Modifier data.json selon l'action ───────────────────────────────
      - name: Update data.json
        env:
          ACTION:     ${{ github.event.client_payload.action }}
          GAME_JSON:  ${{ toJson(github.event.client_payload.game) }}
          GAME_INDEX: ${{ github.event.client_payload.index }}
          DISCORD_ID: ${{ github.event.client_payload.discord_id }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys

          action     = os.environ.get('ACTION', '').strip()
          game_json  = os.environ.get('GAME_JSON', 'null').strip()
          game_index = os.environ.get('GAME_INDEX', '').strip()
          discord_id = os.environ.get('DISCORD_ID', '').strip()

          print(f"Action : {action}")

          # Lire data.json existant
          try:
              with open('data.json', 'r', encoding='utf-8') as f:
                  games = json.load(f)
              if not isinstance(games, list):
                  games = []
          except Exception:
              games = []

          print(f"Jeux existants : {len(games)}")

          if action == 'add':
              game = json.loads(game_json)
              if not isinstance(game, dict):
                  print("Payload invalide", file=sys.stderr)
                  sys.exit(1)
              game['added_by'] = discord_id
              games.insert(0, game)
              print(f"Ajout : {game.get('title','?')}")

          elif action == 'edit':
              game = json.loads(game_json)
              if not isinstance(game, dict):
                  print("Payload invalide", file=sys.stderr)
                  sys.exit(1)
              idx = int(game_index) if game_index.lstrip('-').isdigit() else -1
              if 0 <= idx < len(games):
                  game['added_by'] = discord_id
                  games[idx] = game
                  print(f"Modification index {idx} : {game.get('title','?')}")
              else:
                  print(f"Index {idx} invalide (total: {len(games)})", file=sys.stderr)
                  sys.exit(1)

          elif action == 'delete':
              idx = int(game_index) if game_index.lstrip('-').isdigit() else -1
              if 0 <= idx < len(games):
                  removed = games.pop(idx)
                  print(f"Suppression index {idx} : {removed.get('title','?')}")
              else:
                  print(f"Index {idx} invalide (total: {len(games)})", file=sys.stderr)
                  sys.exit(1)

          else:
              print(f"Action inconnue : {action}", file=sys.stderr)
              sys.exit(1)

          # Écrire data.json
          with open('data.json', 'w', encoding='utf-8') as f:
              json.dump(games, f, ensure_ascii=False, indent=2)

          print(f"data.json mis à jour — {len(games)} jeu(x) au total")
          PYEOF

      # ── 4. Commit & push ───────────────────────────────────────────────────
      - name: Commit & push
        env:
          ACTION:     ${{ github.event.client_payload.action }}
          DISCORD_ID: ${{ github.event.client_payload.discord_id }}
        run: |
          git config user.name  "CrackuzuAdmin[bot]"
          git config user.email "admin-bot@crackuzu.github.io"
          git add data.json
          if git diff --cached --quiet; then
            echo "Aucun changement à commiter"
          else
            git commit -m "chore(data): ${ACTION} by ${DISCORD_ID} [skip ci]"
            git push
            echo "Pushé avec succès"
          fi
