<style>
*,:before,:after{box-sizing:border-box;border:0;margin:0;padding:0}
html{line-height:1.5;font-family:Inter,system-ui,sans-serif;scroll-behavior:smooth}
body{margin:0;background:#000;color:#fff;font-family:Inter,system-ui,sans-serif;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;background:transparent;border:0}
img,svg{display:block;max-width:100%}
ul{list-style:none;margin:0;padding:0}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.3)}
::-webkit-scrollbar-thumb{background:#f97316;border-radius:10px}
:root{--orange:#f97316;--orange-dim:rgba(249,115,22,.1);--w5:rgba(255,255,255,.05);--w10:rgba(255,255,255,.10);--w20:rgba(255,255,255,.20);--w40:rgba(255,255,255,.40)}

/* ════════════════════════════════════════════════════════════
   ANIMATIONS & KEYFRAMES
   ════════════════════════════════════════════════════════════ */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes fadeInScale {
  from {
    opacity: 0;
    transform: scale(0.8) rotate(-2deg);
  }
  to {
    opacity: 1;
    transform: scale(1) rotate(0);
  }
}

@keyframes slideInLeft {
  from {
    opacity: 0;
    transform: translateX(-60px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(60px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes popIn {
  0% {
    opacity: 0;
    transform: scale(0) translateY(20px);
  }
  60% {
    transform: scale(1.05) translateY(-5px);
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

@keyframes float {
  0%, 100% {
    transform: translateY(0) rotate(0deg);
  }
  25% {
    transform: translateY(-10px) rotate(1deg);
  }
  50% {
    transform: translateY(-5px) rotate(0deg);
  }
  75% {
    transform: translateY(-15px) rotate(-1deg);
  }
}

@keyframes pulse {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(249,115,22,.4);
  }
  50% {
    box-shadow: 0 0 0 15px rgba(249,115,22,0);
  }
}

@keyframes shimmer {
  0% {
    background-position: -200% 0;
  }
  100% {
    background-position: 200% 0;
  }
}

@keyframes bounce {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-8px);
  }
}

/* Animation classes */
.animate-pop {
  animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.animate-fade-up {
  animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.animate-slide-left {
  animation: slideInLeft 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.animate-slide-right {
  animation: slideInRight 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.animate-scale {
  animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* Stagger delays */
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.delay-4 { animation-delay: 0.4s; }
.delay-5 { animation-delay: 0.5s; }
.delay-6 { animation-delay: 0.6s; }

/* Start hidden before animation */
.anim-hidden {
  opacity: 0;
}

.header{position:fixed;top:0;left:0;right:0;z-index:100;transition:all .5s;background:linear-gradient(to bottom,rgba(0,0,0,.6),rgba(0,0,0,.1),transparent)}
.header.scrolled{background:rgba(0,0,0,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
.nav{max-width:2000px;margin:0 auto}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:68px}
@media(min-width:768px){.nav-inner{padding:0 2.5rem}}
@media(min-width:1024px){.nav-inner{padding:0 4rem}}
.logo-link{display:flex;align-items:center;gap:.75rem;flex-shrink:0;text-decoration:none}
.logo-text{font-size:1.875rem;font-weight:900;letter-spacing:-.08em;line-height:1;user-select:none;text-transform:uppercase;color:#fff}
.logo-dim{color:rgba(255,255,255,.4)}
.nav-links{display:none}
@media(min-width:1024px){.nav-links{display:flex;align-items:center}}
.nav-links ul{display:flex;align-items:center;gap:.5rem}
.nav-a{padding:.5rem 1rem;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;border-radius:9999px;transition:all .3s;border:1px solid transparent;color:rgba(255,255,255,.4);text-decoration:none}
.nav-a:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.nav-a.active{color:#fff}
.nav-right{display:flex;align-items:center;gap:.75rem}
.search-pill{display:none;align-items:center;gap:.75rem;padding:.5rem 1rem;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);transition:all .3s;cursor:pointer;color:rgba(255,255,255,.4)}
@media(min-width:768px){.search-pill{display:flex}}
.search-pill:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
.search-pill span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.15em}
.icon-btn{width:40px;height:40px;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;transition:all .3s;color:rgba(255,255,255,.7)}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff}

.hero{position:relative;min-height:85vh;display:flex;align-items:flex-end;padding:24rem 0 4rem}
.hero-bg{position:absolute;inset:0;z-index:0;top:0}
.hero-bg img{width:100%;height:100%;object-fit:cover}
.hero-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,#000 0%,rgba(0,0,0,.7) 40%,rgba(0,0,0,.3) 100%)}
.hero-bg::before{content:"";position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 50%,transparent 100%)}

.back-btn{position:absolute;top:100px;left:1.5rem;z-index:50;display:flex;align-items:center;gap:.5rem;padding:.75rem 1.25rem;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:9999px;color:#fff;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;transition:all .25s;cursor:pointer}
.back-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
@media(min-width:768px){.back-btn{left:4rem}}

.hero-content{position:relative;z-index:10;max-width:2000px;margin:0 auto;width:100%;padding:0 1.5rem}
@media(min-width:768px){.hero-content{padding:0 4rem}}

.genres{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}
.genre{padding:.5rem 1rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:9999px;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;color:var(--w40);transition:all .3s cubic-bezier(0.34, 1.56, 0.64, 1);opacity:0;animation:popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards}
.genre:nth-child(1){animation-delay:0.1s}
.genre:nth-child(2){animation-delay:0.15s}
.genre:nth-child(3){animation-delay:0.2s}
.genre:nth-child(4){animation-delay:0.25s}
.genre:nth-child(5){animation-delay:0.3s}
.genre:hover{background:rgba(249,115,22,.2);border-color:var(--orange);color:#fff;transform:scale(1.1) translateY(-3px);box-shadow:0 10px 25px rgba(249,115,22,.3)}

.hero-title{font-size:2.5rem;font-weight:900;text-transform:uppercase;letter-spacing:-.03em;line-height:1;margin-bottom:1.5rem;max-width:600px;opacity:0;animation:slideInLeft 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards;animation-delay:0.2s}
@media(min-width:768px){.hero-title{font-size:4rem;max-width:700px}}
@media(min-width:1024px){.hero-title{font-size:5rem;max-width:800px}}

.meta{display:flex;flex-wrap:wrap;align-items:center;gap:1.5rem;margin-bottom:2rem;font-size:14px;font-weight:600;color:var(--w40);opacity:0;animation:fadeInUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;animation-delay:0.4s}
.meta-item{display:flex;align-items:center;gap:.5rem;transition:all .3s ease}
.meta-item:hover{transform:translateY(-2px);color:#fff}
.meta-item.yellow{color:#fbbf24;animation:bounce 2s infinite ease-in-out}

.actions{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:2rem}
.btn-primary{display:flex;align-items:center;gap:.75rem;padding:1rem 2rem;background:linear-gradient(135deg,var(--orange) 0%,#ea580c 100%);color:#fff;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;border-radius:1rem;transition:all .25s;box-shadow:0 10px 40px rgba(249,115,22,.3)}
.btn-primary:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 20px 60px rgba(249,115,22,.5);animation:pulse 1.5s infinite}
.btn-primary:active{transform:scale(0.98) translateY(0)}
.btn-secondary{display:flex;align-items:center;justify-content:center;width:56px;height:56px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:1rem;color:#fff;transition:all .25s}
.btn-secondary:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);transform:scale(1.1) rotate(5deg);box-shadow:0 10px 30px rgba(255,255,255,.1)}
.btn-secondary:active{transform:scale(0.95) rotate(0deg)}

.synopsis{max-width:600px;margin-bottom:2rem;opacity:0;animation:fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;animation-delay:0.5s}
.synopsis p{font-size:1.1rem;line-height:1.8;color:var(--w40);transition:all .3s ease}
.synopsis:hover p{color:rgba(255,255,255,.7);transform:translateX(5px)}

.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;max-width:500px;margin-bottom:2rem}
@media(min-width:640px){.info-grid{grid-template-columns:repeat(3,1fr)}}
.info-item{padding:1rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:1rem;opacity:0;animation:popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;transition:all .3s cubic-bezier(0.34, 1.56, 0.64, 1)}
.info-item:nth-child(1){animation-delay:0.6s}
.info-item:nth-child(2){animation-delay:0.7s}
.info-item:nth-child(3){animation-delay:0.8s}
.info-item:nth-child(4){animation-delay:0.9s}
.info-item:nth-child(5){animation-delay:1s}
.info-item:nth-child(6){animation-delay:1.1s}
.info-item:hover{transform:translateY(-8px) scale(1.02);background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);box-shadow:0 15px 40px rgba(0,0,0,.3)}
.info-label{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;color:var(--w40);margin-bottom:.5rem}
.info-value{font-size:1rem;font-weight:700;color:#fff}

.container{max-width:2000px;margin:0 auto;padding:4rem 1.5rem}
@media(min-width:768px){.container{padding:4rem}}

.section{margin-bottom:4rem}
.section-title{font-size:1.5rem;font-weight:900;text-transform:uppercase;letter-spacing:.05em;margin-bottom:1.5rem;display:flex;align-items:center;gap:.75rem}
.section-title svg{color:var(--orange)}

.magnets-grid{display:grid;gap:1rem}
.magnet-card{display:flex;align-items:center;gap:1rem;padding:1.25rem;background:var(--w5);border:1px solid var(--w10);border-radius:1rem;transition:all .4s cubic-bezier(0.34, 1.56, 0.64, 1);cursor:pointer;opacity:0;animation:fadeInUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards}
.magnet-card:nth-child(1){animation-delay:0.1s}
.magnet-card:nth-child(2){animation-delay:0.2s}
.magnet-card:nth-child(3){animation-delay:0.3s}
.magnet-card:nth-child(4){animation-delay:0.4s}
.magnet-card:hover{border-color:var(--orange);background:rgba(249,115,22,.1);transform:translateX(10px) scale(1.02);box-shadow:0 15px 40px rgba(249,115,22,.2)}
.magnet-card:active{transform:translateX(5px) scale(0.98)}
.magnet-icon{width:48px;height:48px;background:var(--orange-dim);border-radius:1rem;display:flex;align-items:center;justify-content:center;color:var(--orange);flex-shrink:0}
.magnet-info{flex:1;min-width:0}
.magnet-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.magnet-link{font-size:12px;color:var(--w40);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.magnet-arrow{color:var(--w40)}

.yt-section{display:flex;align-items:center;gap:1.5rem;padding:2rem;background:linear-gradient(135deg,rgba(249,115,22,.1) 0%,rgba(249,115,22,.05) 100%);border:1px solid rgba(249,115,22,.2);border-radius:1.5rem}
.yt-info{flex:1}
.yt-title{font-size:1.25rem;font-weight:800;margin-bottom:.5rem}
.yt-desc{font-size:14px;color:var(--w40)}
.yt-btn{display:flex;align-items:center;gap:.5rem;padding:1rem 1.5rem;background:#ff0000;color:#fff;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;border-radius:1rem;transition:all .25s;flex-shrink:0}
.yt-btn:hover{background:#cc0000;transform:scale(1.02)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;color:var(--w40)}
.spinner{width:40px;height:40px;border:3px solid rgba(249,115,22,.2);border-top-color:#f97316;border-radius:9999px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error{text-align:center;padding:4rem;color:var(--w40)}
.error h2{font-size:2rem;font-weight:900;margin-bottom:1rem;color:#fff}

.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:2rem}
.not-found h1{font-size:8rem;font-weight:900;background:linear-gradient(135deg,var(--orange) 0%,#ea580c 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
.not-found p{font-size:1.25rem;color:var(--w40);margin-bottom:2rem}
</style>
</head>

<!-- Download Menu Modal -->

    <div style="padding:2rem">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
        <h2 style="font-size:1.5rem;font-weight:800;color:#fff;margin:0">Télécharger</h2>
        <button onclick="closeDownloadMenu()" style="width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:#fff;font-size:1.5rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s" onmouseover="this.style.background='rgba(249,115,22,.8)'" onmouseout="this.style.background='rgba(255,255,255,.1)'">×</button>
      </div>
      <div id="downloadList"></div>
    </div>
  </div>
</div>

<!-- LOADING -->
<div class="loading" id="loading">
  <div class="spinner"></div>
  <span>Chargement du jeu...</span>
</div>

<!-- NOT FOUND -->
<div class="not-found" id="notFound" style="display:none">
  <h1>404</h1>
  <p>Jeu non trouvé</p>
  <button class="btn-primary" onclick="location.href='index.html'">Retour à l'accueil</button>
</div>

<script>
// Récupérer le paramètre d'URL (id ou nom du jeu)
function getGameId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id') || params.get('game') || null;
}

// Charger les données du jeu
async function loadGame() {
  const gameId = getGameId();
  
  try {
    // Try localStorage first (from admin-local.html)
    let games = [];
    const localData = localStorage.getItem('crackuzu_games');
    if (localData) {
      games = JSON.parse(localData);
      console.log('📦 Jeux chargés depuis localStorage:', games.length);
    } else {
      // Fallback to data.json
      const res = await fetch('data.json');
      if (!res.ok) throw new Error('Failed to load');
      games = await res.json();
    }
    
    let game;
    if (gameId) {
      // Chercher par ID ou titre
      game = games.find(g => g.id === gameId || g.title === gameId);
    } else {
      // Prendre le premier jeu par défaut
      game = games[0];
    }
    
    if (!game) {
      showNotFound();
      return;
    }
    
    renderGame(game);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('hero').style.display = 'none';
    document.body.innerHTML = '<div class="error"><h2>Erreur de chargement</h2><p>Impossible de charger les données du jeu.</p></div>';
  }
}

function renderGame(game) {
  // Cacher le loading
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('infoGrid').style.display = 'grid';
  
  // Titre
  document.getElementById('gameTitle').textContent = game.title;
  document.title = `CRACKUZU – ${game.title}`;
  
  // Background image
  const heroImg = document.getElementById('heroImg');
  if (game.banner_url) {
    heroImg.src = game.banner_url;
    heroImg.alt = game.title;
  } else if (game.portrait_url) {
    heroImg.src = game.portrait_url;
    heroImg.alt = game.title;
  } else {
    // Gradient fallback
    document.getElementById('heroBg').style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
    heroImg.style.display = 'none';
  }
  
  // Genres/Catégories
  const genresContainer = document.getElementById('genres');
  if (game.categories && Array.isArray(game.categories)) {
    genresContainer.innerHTML = game.categories.map(c => 
      `<span class="genre">${escapeHtml(c)}</span>`
    ).join('');
  }
  
  // Meta infos
  if (game.year) {
    document.getElementById('yearValue').textContent = game.year;
    document.getElementById('yearItem').style.display = 'flex';
  }
  if (game.categories?.length) {
    document.getElementById('catValue').textContent = game.categories.join(', ');
    document.getElementById('catItem').style.display = 'flex';
    document.getElementById('typeValue').textContent = game.categories[0];
  }
  if (game.rating) {
    document.getElementById('ratingValue').textContent = game.rating;
    document.getElementById('rating').style.display = 'flex';
  }
  
  // Description
  document.getElementById('descText').textContent = game.description || 'Aucune description disponible pour ce jeu.';
  
  // Magnets - store for download menu
  window.currentMagnets = game.magnets || [];
  if (game.magnets && game.magnets.length > 0) {
    // Download button opens menu
    document.getElementById('downloadBtn').onclick = () => openDownloadMenu(game);
    
    // Update info grid with size and source
    const firstSource = game.magnets[0];
    const isObject = typeof firstSource === 'object' && firstSource !== null;
    
    // Source name
    const sourceName = isObject ? (firstSource.source || firstSource.name || 'Source') : 'Torrent';
    document.getElementById('sourceValue').textContent = sourceName.length > 15 ? sourceName.substring(0, 15) + '...' : sourceName;
    
    // Size
    const size = isObject ? (firstSource.size || '-') : '-';
    document.getElementById('sizeValue').textContent = size;
    
    // Adjust labels based on source type
    if (firstSource.url && firstSource.url.startsWith('magnet')) {
      document.getElementById('label1').textContent = 'Magnet';
    } else if (isObject && firstSource.type === 'torrent') {
      document.getElementById('label1').textContent = 'Torrent';
    } else {
      document.getElementById('label1').textContent = 'Source';
    }
  } else {
    document.getElementById('downloadBtn').style.display = 'none';
  }
  
  // Trailer button
  if (game.ytb_id) {
    document.getElementById('trailerBtn').style.display = 'flex';
    document.getElementById('trailerBtn').onclick = () => openTrailer(game.ytb_id);
    window.currentYtbId = game.ytb_id;
  } else {
    document.getElementById('trailerBtn').style.display = 'none';
  }
}

function openDownloadMenu(game) {
  const overlay = document.getElementById('downloadModal');
  const box = document.getElementById('downloadBox');
  const list = document.getElementById('downloadList');
  
  // Parse download sources - support magnets, direct links, old/new formats
  const sources = game.magnets || [];
  
  if (sources.length === 0) {
    list.innerHTML = '<div style="padding:2rem;text-align:center;color:#94a3b8">Aucune source de téléchargement disponible</div>';
  } else {
    list.innerHTML = sources.map((source, i) => {
      // Handle both old format (string) and new format (object)
      const isObject = typeof source === 'object' && source !== null;
      const url = isObject ? (source.url || '') : source;
      const size = isObject ? (source.size || '') : '';
      const sourceName = isObject ? (source.source || 'Source') : 'Magnet';
      const displayName = isObject ? (source.name || '') : '';
      // All buttons are orange now - no color differentiation
      
      // For magnets, try to extract name from URL
      let extractedName = '';
      if (url.startsWith('magnet:')) {
        const nameMatch = url.match(/dn=([^&]+)/);
        if (nameMatch) {
          extractedName = decodeURIComponent(nameMatch[1].replace(/\+/g, ' '))
            .replace(/\.torrent$/i, '').replace(/%20/g, ' ');
        }
      }
      
      const finalName = displayName || extractedName || `Source ${i + 1}`;
      
      // Detect source type from name if not specified
      let sourceType = sourceName;
      if (sourceType === 'Source' || sourceType === 'Custom') {
        if (finalName.includes('FitGirl')) sourceType = 'FitGirl Repack';
        else if (finalName.includes('DODI')) sourceType = 'DODI Repack';
        else if (finalName.includes('OnlineFix')) sourceType = 'OnlineFix';
        else if (finalName.includes('SteamRIP')) sourceType = 'SteamRIP';
        else sourceType = 'Source de téléchargement';
      }
      
      // Icon based on type
      let iconSvg;
      if (url.startsWith('magnet')) {
        iconSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>';
      } else {
        iconSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>';
      }
      
      // All buttons are orange now
      const btnGradient = 'linear-gradient(135deg,#f97316 0%,#ea580c 100%)';
      const btnShadow = '0 10px 20px rgba(249,115,22,.3)';
      
      return `
        <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:1rem;padding:1.25rem;margin-bottom:1rem;transition:all .2s" onmouseover="this.style.borderColor='rgba(249,115,22,.5)';this.style.background='rgba(249,115,22,.05)'" onmouseout="this.style.borderColor='rgba(255,255,255,.1)';this.style.background='rgba(255,255,255,.05)'">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.75rem">
            <div>
              <div style="font-weight:700;color:#fff;font-size:1rem">${escapeHtml(sourceType)}</div>
              <div style="font-size:.85rem;color:#94a3b8;margin-top:.25rem">${escapeHtml(finalName.substring(0, 60))}${finalName.length > 60 ? '...' : ''}</div>
              ${size ? `<div style="font-size:.8rem;color:#64748b;margin-top:.5rem"><span style="color:#f97316">📦 Taille:</span> ${escapeHtml(size)}</div>` : ''}
            </div>
            ${size ? `<div style="background:rgba(249,115,22,.2);color:#f97316;padding:.35rem .75rem;border-radius:.5rem;font-size:.75rem;font-weight:600">${escapeHtml(size)}</div>` : ''}
          </div>
          <button onclick="window.open('${escapeHtml(url)}', '_blank')" style="width:100%;padding:.875rem;background:${btnGradient};color:#fff;border:none;border-radius:.75rem;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:.5rem;box-shadow:${btnShadow}" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 10px 30px rgba(249,115,22,.4)'" onmouseout="this.style.transform='';this.style.boxShadow='${btnShadow}'">
            ${iconSvg}
            Télécharger
          </button>
        </div>
      `;
    }).join('');
  }
  
  // Show modal
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  overlay.offsetHeight;
  overlay.style.opacity = '1';
  box.style.transform = 'scale(1)';
  box.style.opacity = '1';
}

function closeDownloadMenu(e) {
  if (e && e.target !== e.currentTarget) return;
  
  const overlay = document.getElementById('downloadModal');
  const box = document.getElementById('downloadBox');
  
  overlay.style.opacity = '0';
  box.style.transform = 'scale(.9)';
  box.style.opacity = '0';
  
  setTimeout(() => {
    overlay.style.display = 'none';
    document.body.style.overflow = '';
  }, 300);
}

function openTrailer(ytbId) {
  if (!ytbId) return;
  const overlay = document.getElementById('trailerOverlay');
  const box = document.getElementById('trailerBox');
  const frame = document.getElementById('trailerFrame');
  
  // Afficher l'overlay
  overlay.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  
  // Forcer le reflow pour que l'animation fonctionne
  overlay.offsetHeight;
  
  // Animer l'ouverture
  overlay.style.opacity = '1';
  box.style.transform = 'scale(1)';
  box.style.opacity = '1';
  
  // Charger l'iframe
  frame.src = `https://www.youtube.com/embed/${ytbId}?autoplay=1&rel=0&modestbranding=1`;
}

function closeTrailer(e) {
  if (e && e.target !== e.currentTarget && e.target.tagName !== 'BUTTON') return;
  
  const overlay = document.getElementById('trailerOverlay');
  const box = document.getElementById('trailerBox');
  const frame = document.getElementById('trailerFrame');
  
  // Stopper la vidéo immédiatement (pas attendre l'animation)
  frame.src = 'about:blank';
  
  // Animer la fermeture
  overlay.style.opacity = '0';
  box.style.transform = 'scale(.8)';
  box.style.opacity = '0';
  
  // Cacher après l'animation
  setTimeout(() => {
    overlay.style.display = 'none';
    frame.src = '';
    document.body.style.overflow = '';
  }, 400);
}

function showNotFound() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('hero').style.display = 'none';
  document.getElementById('notFound').style.display = 'flex';
}

function escapeHtml(str) {
  if (!str) return '';
  return str.toString()
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#039;');
}

// Header scroll effect
window.addEventListener('scroll', () => {
  document.getElementById('hdr').classList.toggle('scrolled', window.scrollY > 50);
}, { passive: true });

// Intersection Observer for scroll animations
const observerOptions = {
  root: null,
  rootMargin: '0px',
  threshold: 0.1
};

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.style.opacity = '1';
      entry.target.style.transform = 'translateY(0)';
      
      // Add stagger animation to children if it's a container
      const children = entry.target.querySelectorAll('.magnet-card, .genre, .info-item');
      children.forEach((child, index) => {
        setTimeout(() => {
          child.style.opacity = '1';
          child.style.animationPlayState = 'running';
        }, index * 100);
      });
    }
  });
}, observerOptions);

// Observe elements after page load
document.addEventListener('DOMContentLoaded', () => {
  loadGame();
  
  // Observe sections for scroll animations
  setTimeout(() => {
    const sections = document.querySelectorAll('.section, .magnets-grid, .info-grid');
    sections.forEach(section => {
      section.style.opacity = '0';
      section.style.transform = 'translateY(30px)';
      section.style.transition = 'all 0.6s cubic-bezier(0.22, 1, 0.36, 1)';
      observer.observe(section);
    });
  }, 100);
  
});
</script>

</body>
</html>
