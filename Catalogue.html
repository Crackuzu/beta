<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="CRACKUZU – Catalogue de jeux PC. Téléchargez via Crackuzu.">
<meta name="theme-color" content="#000000">
<link rel="icon" type="image/png" href="logo.png">
<title>CRACKUZU – Catalogue</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── RESET ───────────────────────────────────────────────── */
*,:before,:after{box-sizing:border-box;border-width:0;border-style:solid;border-color:#333}
html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:Inter,system-ui,sans-serif;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{margin:0;background:#000;color:#fff;font-family:Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden}
a{color:inherit;text-decoration:inherit}
button{font-family:inherit;font-size:100%;font-weight:inherit;line-height:inherit;color:inherit;margin:0;padding:0;cursor:pointer;background:transparent;border-width:0;-webkit-appearance:button}
h1,h2,h3,h4,h5,p{margin:0}
ul{list-style:none;margin:0;padding:0}
input{font-family:inherit;font-size:100%;color:inherit;margin:0;padding:0}
img,svg,iframe{display:block}
img{max-width:100%;height:auto;vertical-align:middle}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.3)}
::-webkit-scrollbar-thumb{background:#f97316;border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:#ea580c}
::selection{background:rgba(249,115,22,.3);color:#fff}
:root{
  --purple:#f97316;
  --purple-dim:rgba(249,115,22,.14);
  --orange:#f97316;
  --orange-dim:rgba(249,115,22,.1);
  --w5:rgba(255,255,255,.05);
  --w10:rgba(255,255,255,.10);
  --w20:rgba(255,255,255,.20);
  --w40:rgba(255,255,255,.40);
}

/* Utility classes */
.orange{color:#f97316}

/* ── HEADER ──────────────────────────────────────────────── */
.header{position:fixed;top:0;left:0;right:0;z-index:100;transition:all .5s;background:linear-gradient(to bottom,rgba(0,0,0,.6),rgba(0,0,0,.1),transparent)}
.header.scrolled{background:rgba(0,0,0,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
.nav{max-width:2000px;margin:0 auto}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:68px}
@media(min-width:768px){.nav-inner{padding:0 2.5rem}}
@media(min-width:1024px){.nav-inner{padding:0 4rem}}
.logo-link{display:flex;align-items:center;gap:.75rem;flex-shrink:0;text-decoration:none}
.logo-text{font-size:1.875rem;font-weight:900;letter-spacing:-.08em;line-height:1;user-select:none;text-transform:uppercase;color:#fff}
.logo-dim{color:rgba(255,255,255,.4)}
.nav-links{display:none}
@media(min-width:1024px){.nav-links{display:flex;align-items:center}}
.nav-links ul{display:flex;align-items:center;gap:.5rem}
.nav-a{padding:.5rem 1rem;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;border-radius:9999px;transition:all .3s;border:1px solid transparent;color:rgba(255,255,255,.4);text-decoration:none}
.nav-a:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.nav-a.active{color:#fff}
.nav-right{display:flex;align-items:center;gap:.75rem}
.search-pill{display:none;align-items:center;gap:.75rem;padding:.5rem 1rem;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);transition:all .3s;cursor:pointer;color:rgba(255,255,255,.4)}
@media(min-width:768px){.search-pill{display:flex}}
.search-pill:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
.search-pill span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.15em}
.icon-btn{width:40px;height:40px;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;transition:all .3s;color:rgba(255,255,255,.7)}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── PAGE ────────────────────────────────────────────────── */
.page{min-height:100vh;background:#000;padding-top:68px;padding-bottom:5rem;position:relative;overflow-x:hidden}
.glow-l{position:fixed;top:0;left:25%;width:500px;height:300px;background:rgba(249,115,22,.05);filter:blur(120px);transform:translateY(-50%);pointer-events:none;z-index:0}
.glow-r{position:fixed;top:0;right:25%;width:400px;height:250px;background:rgba(249,115,22,.05);filter:blur(120px);transform:translateY(-50%);pointer-events:none;z-index:0}
.container{max-width:2000px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:10}
@media(min-width:768px){.container{padding:2.5rem 2.5rem 4rem}}
@media(min-width:1024px){.container{padding:3rem 4rem 4rem}}

/* ── PAGE HEADER ─────────────────────────────────────────── */
.page-head{margin-bottom:3rem}
.page-title{font-size:3rem;font-weight:900;text-transform:uppercase;letter-spacing:-.05em;line-height:1}
@media(min-width:768px){.page-title{font-size:3.9rem}}
.page-title-inner{color:#fff}
.page-sub{color:var(--w40);font-size:1.05rem;font-weight:500;line-height:1.6;max-width:43rem;margin-top:.75rem}

/* ── FILTERS ─────────────────────────────────────────────── */
.filters{margin-bottom:2.4rem;display:flex;flex-direction:column;gap:1.2rem}

/* genre bar */
.genre-bar{display:flex;align-items:center;gap:.45rem;padding:.45rem;border-radius:9999px;border:1px solid var(--w10);background:var(--w5);backdrop-filter:blur(8px);width:max-content;max-width:100%;overflow-x:auto;scrollbar-width:none}
.genre-bar::-webkit-scrollbar{display:none}
.gtab{padding:.42rem 1.2rem;border-radius:9999px;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;transition:all .25s;cursor:pointer;color:var(--w40);border:0;background:none;white-space:nowrap;flex-shrink:0}
.gtab:hover{color:rgba(255,255,255,.8);background:var(--w5)}
.gtab.on{background:#fff;color:#000;box-shadow:0 0 20px rgba(255,255,255,.05)}

/* bottom row */
.filter-row{display:flex;align-items:center;justify-content:space-between;gap:1.05rem;flex-wrap:wrap}
.fl-left{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap}

/* sort pill */
.sort-pill{display:flex;align-items:center;gap:.3rem;padding:.36rem;border-radius:.75rem;border:1px solid var(--w10);background:var(--w5);backdrop-filter:blur(8px)}
.stab{padding:.54rem 1.05rem;border-radius:.55rem;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;transition:all .25s;cursor:pointer;color:var(--w40);border:1px solid transparent;background:none;white-space:nowrap}
.stab:hover{color:#fff;border-color:var(--w20)}
.stab.on{background:#fff;color:#000;border-color:#fff}

/* inline search */
.inline-srch{display:flex;align-items:center;gap:.75rem;padding:.6rem 1.05rem;border-radius:.875rem;border:1px solid var(--w10);background:var(--w5);backdrop-filter:blur(8px);flex:1;max-width:384px}
.inline-srch svg{flex-shrink:0;color:var(--w40)}
.inline-srch input{background:none;border:0;outline:none;font-size:.975rem;color:#fff;width:100%;font-weight:600}
.inline-srch input::placeholder{color:var(--w40)}

/* count */
.res-count{font-size:11.5px;font-weight:900;text-transform:uppercase;letter-spacing:.3em;color:rgba(255,255,255,.18)}

/* ── GRID ────────────────────────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:640px){.grid{grid-template-columns:repeat(4,1fr);gap:1.25rem}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(5,1fr);gap:1.5rem}}
@media(min-width:1280px){.grid{grid-template-columns:repeat(6,1fr)}}

/* ── CARD ────────────────────────────────────────────────── */
.card{position:relative;border-radius:.875rem;overflow:hidden;cursor:pointer;transition:all .5s cubic-bezier(.23,1,.32,1);display:block;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.card:hover{transform:scale(1.035);z-index:2;box-shadow:0 20px 60px rgba(249,115,22,.08)}
.card-img{aspect-ratio:2/3;width:100%;position:relative;background:#0d0d0d}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:filter .4s}
.card:hover .card-img img{filter:brightness(.35)}
.card-noimg{width:100%;height:100%;background:linear-gradient(135deg,#1a1210,#0a0a0a);display:flex;align-items:center;justify-content:center;font-size:3rem}
/* badges */
.card-yr{position:absolute;top:.5rem;left:.5rem;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);padding:.15rem .45rem;border-radius:.25rem;font-size:7px;font-weight:900;color:rgba(255,255,255,.65);letter-spacing:.12em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);z-index:10}
.card-cat{position:absolute;top:.5rem;right:.5rem;background:var(--orange-dim);border:1px solid rgba(249,115,22,.25);padding:.15rem .45rem;border-radius:.25rem;font-size:7px;font-weight:900;color:#fb923c;letter-spacing:.1em;text-transform:uppercase;z-index:10;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
/* play icon centré */
.card-play{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;z-index:5}
.card:hover .card-play{opacity:1}
.card-play-btn{width:46px;height:46px;border-radius:9999px;background:rgba(255,255,255,.14);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.32);display:flex;align-items:center;justify-content:center;transition:all .2s}
.card-play-btn:hover{background:rgba(255,255,255,.24);transform:scale(1.08)}
.card-play-btn svg{margin-left:3px}
/* info bas hover */
.card-info{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,transparent 55%);opacity:0;transition:opacity .3s;display:flex;flex-direction:column;justify-content:flex-end;padding:.75rem;z-index:4}
.card:hover .card-info{opacity:1}
.card-name{font-size:9.5px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:-.01em;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.2rem}
.card-sub{font-size:8px;color:rgba(255,255,255,.45);font-weight:700;text-transform:uppercase;letter-spacing:.08em;display:flex;align-items:center;gap:.3rem;flex-wrap:wrap}

/* ── EMPTY / LOADER ──────────────────────────────────────── */
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6rem 2rem;gap:1rem;text-align:center}
.empty-ico{font-size:3rem;opacity:.25}
.empty-ttl{font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:-.02em;color:rgba(255,255,255,.25)}
.empty-sub{font-size:.8125rem;color:rgba(255,255,255,.18);font-weight:500}
.loader{grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:5rem;gap:1rem}
.spin{width:26px;height:26px;border:2px solid rgba(249,115,22,.2);border-top-color:#f97316;border-radius:9999px;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-txt{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.3em;color:rgba(255,255,255,.18)}

/* ── PAGINATION ──────────────────────────────────────────── */
.pag{display:flex;justify-content:center;align-items:center;gap:.375rem;margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.05)}
.pb{min-width:36px;height:36px;border-radius:.5rem;border:1px solid var(--w10);background:var(--w5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--w40);cursor:pointer;transition:all .2s;padding:0 .5rem}
.pb:hover{border-color:var(--w20);color:#fff}
.pb.cur{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 0 20px rgba(249,115,22,.3)}
.pb.off{opacity:.25;pointer-events:none}

/* ── SEARCH OVERLAY ──────────────────────────────────────── */
.sov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.93);backdrop-filter:blur(24px);display:flex;flex-direction:column;padding:5.5rem 1.5rem 2rem;opacity:0;pointer-events:none;transition:opacity .25s;visibility:hidden}
.sov.open{opacity:1;pointer-events:all;visibility:visible}
.sbox{position:relative;max-width:640px;margin:0 auto;width:100%}
.sinput{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);border-radius:1rem;padding:1rem 3.5rem 1rem 3.25rem;font-size:1.1rem;font-weight:600;color:#fff;outline:none;transition:all .25s;font-family:Inter,sans-serif}
.sinput:focus{border-color:var(--orange);background:rgba(249,115,22,.05)}
.sinput::placeholder{color:rgba(255,255,255,.22)}
.sico{position:absolute;left:1.125rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);pointer-events:none}
.sx{position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.3);cursor:pointer;transition:color .2s;background:none;border:0;padding:.25rem}
.sx:hover{color:#fff}
.sres{max-width:640px;margin:1.5rem auto 0;display:flex;flex-direction:column;gap:.5rem;overflow-y:auto;max-height:calc(100vh - 16rem)}
.sri{display:flex;align-items:center;gap:1rem;padding:.875rem;border-radius:.875rem;background:var(--w5);border:1px solid rgba(255,255,255,.06);cursor:pointer;transition:all .2s}
.sri:hover{background:var(--w10);border-color:rgba(255,255,255,.14)}
.sri-cov{width:44px;height:62px;border-radius:.5rem;object-fit:cover;flex-shrink:0;background:#1a1a1a}
.sri-info{flex:1;min-width:0}
.sri-name{font-size:.875rem;font-weight:900;color:#fff;letter-spacing:-.02em;margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sri-meta{font-size:9.5px;font-weight:700;color:rgba(255,255,255,.35);text-transform:uppercase;letter-spacing:.1em}
.sri-arr{width:32px;height:32px;border-radius:9999px;background:var(--w5);border:1px solid var(--w10);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.4);flex-shrink:0;transition:all .2s}
.sri:hover .sri-arr{background:var(--orange);border-color:var(--orange);color:#fff}
.sempty{text-align:center;padding:3rem;color:rgba(255,255,255,.18);font-size:.875rem;font-weight:600}

/* ── MODAL ───────────────────────────────────────────────── */
.mov{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .3s;visibility:hidden}
.mov.open{opacity:1;pointer-events:all;visibility:visible}
.modal{background:#0d0d0d;border:1px solid rgba(255,255,255,.08);border-radius:1.5rem;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;transform:translateY(24px) scale(.97);transition:transform .35s cubic-bezier(.34,1.56,.64,1);scrollbar-width:none}
.modal::-webkit-scrollbar{display:none}
.mov.open .modal{transform:translateY(0) scale(1)}
.m-banner{position:relative;width:100%;aspect-ratio:16/9;background:#0a0a0a;overflow:hidden;border-radius:1.5rem 1.5rem 0 0}
.m-banner img{width:100%;height:100%;object-fit:cover}
.m-banner iframe{width:100%;height:100%;border:0}
.m-banner-grad{position:absolute;inset:0;background:linear-gradient(to top,#0d0d0d 0%,rgba(13,13,13,.2) 50%,transparent 100%);pointer-events:none}
.m-close{position:absolute;top:.875rem;right:.875rem;width:34px;height:34px;border-radius:9999px;background:rgba(13,13,13,.85);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);cursor:pointer;transition:all .2s;z-index:10;backdrop-filter:blur(8px)}
.m-close:hover{background:var(--w10);color:#fff}
.m-yt-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5}
.m-yt-inner{width:64px;height:64px;border-radius:9999px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;transition:all .2s}
.m-yt-inner:hover{background:rgba(255,255,255,.22);transform:scale(1.08)}
.m-yt-inner svg{margin-left:4px}
.m-body{padding:1.25rem 1.5rem 2rem}
@media(min-width:640px){.m-body{padding:1.5rem 2rem 2.25rem}}
.m-title{font-size:1.5rem;font-weight:900;letter-spacing:-.04em;text-transform:uppercase;line-height:1;margin-bottom:.75rem}
@media(min-width:640px){.m-title{font-size:1.875rem}}
.m-pills{display:flex;flex-wrap:wrap;align-items:center;gap:.375rem;margin-bottom:1rem}
.mp-yr{background:var(--w5);color:rgba(255,255,255,.5);font-size:9.5px;font-weight:800;padding:.2rem .55rem;border-radius:.3rem;text-transform:uppercase;letter-spacing:.12em;border:1px solid var(--w10)}
.mp-cat{background:var(--orange-dim);color:#fb923c;font-size:9.5px;font-weight:900;padding:.2rem .55rem;border-radius:.3rem;text-transform:uppercase;letter-spacing:.12em;border:1px solid rgba(249,115,22,.2)}
.mp-date{color:rgba(255,255,255,.25);font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em}
.m-sep{color:rgba(255,255,255,.12)}
.m-desc{font-size:.875rem;color:rgba(255,255,255,.42);line-height:1.72;margin-bottom:1.375rem}
.m-actions{display:flex;flex-wrap:wrap;gap:.75rem;margin-bottom:1.375rem}
.btn-w{display:inline-flex;align-items:center;gap:.625rem;padding:.75rem 1.625rem;background:#fff;color:#000;font-size:10px;font-weight:900;border-radius:.875rem;transition:all .25s;text-transform:uppercase;letter-spacing:.2em;border:0;cursor:pointer;white-space:nowrap}
.btn-w:hover{background:#e8e8e8;transform:scale(1.03)}
.btn-p{display:inline-flex;align-items:center;gap:.625rem;padding:.75rem 1.625rem;background:var(--orange);color:#fff;font-size:10px;font-weight:900;border-radius:.875rem;transition:all .25s;text-transform:uppercase;letter-spacing:.2em;border:0;cursor:pointer;white-space:nowrap}
.btn-p:hover{background:#fb923c;transform:scale(1.03);box-shadow:0 8px 24px rgba(249,115,22,.3)}
.btn-g{display:inline-flex;align-items:center;gap:.625rem;padding:.75rem 1.625rem;background:var(--w5);color:rgba(255,255,255,.45);font-size:10px;font-weight:900;border-radius:.875rem;border:1px solid var(--w10);transition:all .25s;text-transform:uppercase;letter-spacing:.2em;cursor:pointer;white-space:nowrap}
.btn-g:hover{background:var(--w10);color:#fff}
.m-mag-sec{border-top:1px solid rgba(255,255,255,.06);padding-top:1.25rem}
.m-mag-lbl{font-size:8.5px;font-weight:900;text-transform:uppercase;letter-spacing:.35em;color:rgba(255,255,255,.18);margin-bottom:.75rem}
.m-mag-list{display:flex;flex-direction:column;gap:.425rem}
.m-mag-item{display:flex;align-items:center;gap:.75rem;padding:.575rem .875rem;background:var(--w5);border:1px solid rgba(255,255,255,.06);border-radius:.75rem;transition:all .2s;text-decoration:none;color:rgba(255,255,255,.38);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.m-mag-item:hover{background:var(--orange-dim);border-color:rgba(249,115,22,.2);color:#f97316}
.m-mag-item svg{flex-shrink:0;color:rgba(249,115,22,.45);transition:color .2s}
.m-mag-item:hover svg{color:#f97316}
.m-mag-empty{font-size:12px;color:rgba(255,255,255,.16);text-align:center;padding:1.25rem;font-style:italic}

/* ── FOOTER ──────────────────────────────────────────────── */
footer{border-top:1px solid rgba(255,255,255,.05);padding:3rem 1.5rem;background:#000}
.ft-inner{max-width:1400px;margin:0 auto;display:flex;flex-direction:column;gap:2rem}
@media(min-width:768px){.ft-inner{flex-direction:row;justify-content:space-between;align-items:flex-start}}
.ft-logo{font-size:1.5rem;font-weight:900;letter-spacing:-.06em;text-transform:uppercase;margin-bottom:.5rem}
.ft-logo .d{color:rgba(255,255,255,.2)}
.ft-sub{font-size:11px;color:rgba(255,255,255,.18);font-weight:500;line-height:1.6;max-width:300px}
.ft-copy{font-size:10px;color:rgba(255,255,255,.1);text-transform:uppercase;letter-spacing:.15em}
</style>
</head>
<body>

<header class="header" id="hdr">
  <div class="nav">
    <div class="nav-inner">
      <a class="logo-link" href="index.html">
        <h1 class="logo-text"><span>Crack</span><span class="logo-dim">uzu</span></h1>
      </a>
      <div class="nav-links">
        <ul>
          <li><a class="nav-a" href="index.html">Accueil</a></li>
          <li><a class="nav-a active" href="Catalogue.html">Catalogue</a></li>
          <li><a class="nav-a" href="admin.html">Admin</a></li>
        </ul>
      </div>
      <div class="nav-right">
        <button class="search-pill" onclick="openSrch()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
          <span>Rechercher</span>
        </button>
        <button class="icon-btn" onclick="openSrch()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21 21-4.34-4.34"/><circle cx="11" cy="11" r="8"/></svg>
        </button>
      </div>
    </div>
  </div>
</header>

<div class="glow-l"></div>
<div class="glow-r"></div>

<!-- SEARCH OVERLAY -->
<div class="sov" id="sov" onclick="if(event.target===this)closeSrch()">
  <div class="sbox">
    <span class="sico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.34-4.34"/></svg></span>
    <input class="sinput" id="sinput" type="text" placeholder="Chercher un jeu…" autocomplete="off" oninput="doSrch(this.value)">
    <button class="sx" onclick="closeSrch()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
  </div>
  <div class="sres" id="sres"></div>
</div>

<!-- MODAL -->
<div class="mov" id="mov" onclick="if(event.target===this)closeMod()">
  <div class="modal" id="modal-box">
    <div class="m-banner">
      <button class="m-close" onclick="closeMod()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
      <img id="m-img" src="" alt="" style="display:none">
      <div id="m-trailer" style="display:none;width:100%;height:100%"></div>
      <div id="m-noimg" style="display:none;width:100%;height:100%;background:linear-gradient(135deg,#1a1210,#0a0a0a);align-items:center;justify-content:center;font-size:5rem">🎮</div>
      <div class="m-banner-grad"></div>
      <div class="m-yt-btn" id="m-ytbtn" style="display:none" onclick="openTrailer()">
        <div class="m-yt-inner">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="#fff"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>
        </div>
      </div>
    </div>
    <div class="m-body">
      <div class="m-title" id="m-title"></div>
      <div class="m-pills" id="m-pills"></div>
      <div class="m-desc" id="m-desc"></div>
      <div class="m-actions" id="m-actions"></div>
      <div class="m-mag-sec" id="m-mag-sec" style="display:none">
        <div class="m-mag-lbl">Télécharger via Crackuzu</div>
        <div class="m-mag-list" id="m-mag-list"></div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<main class="page">
  <div class="container">

    <div class="page-head">
      <h1 class="page-title"><span class="page-title-inner">Catalogue</span><span class="orange">.</span></h1>
      <p class="page-sub">Tous les jeux disponibles — télécharge via Crackuzu.</p>
    </div>

    <div class="filters">
      <div class="genre-bar" id="gtabs"></div>
      <div class="filter-row">
        <div class="fl-left">
          <div class="sort-pill">
            <button class="stab on" id="sort-new" onclick="setSort('new')">Récents</button>
            <button class="stab" id="sort-az"  onclick="setSort('az')">A–Z</button>
          </div>
          <div class="inline-srch">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.34-4.34"/></svg>
            <input type="text" id="cq" placeholder="Filtrer par nom…" oninput="applyFilters()">
          </div>
        </div>
        <span class="res-count" id="res-count"></span>
      </div>
    </div>

    <div class="grid" id="grid">
      <div class="loader"><div class="spin"></div><span class="spin-txt">Chargement…</span></div>
    </div>
    <div class="pag" id="pag"></div>

  </div>
</main>

<footer>
  <div class="ft-inner">
    <div>
      <div class="ft-logo">Crack<span class="d">uzu</span></div>
      <p class="ft-sub">Catalogue non officiel de jeux PC. Téléchargez via Crackuzu.</p>
    </div>
    <div class="ft-copy">© 2025 Crackuzu</div>
  </div>
</footer>

<script>
const PPG=60;
let ALL=[],FIL=[],pg=1,aGenre='all',aSort='new',_cur=null;

async function init(){
  try{
    // Try localStorage first (from admin-local.html)
    const localData = localStorage.getItem('crackuzu_games');
    if (localData) {
      const games = JSON.parse(localData);
      proc(games);
      console.log('📦 Jeux chargés depuis localStorage:', games.length);
      return;
    }

    // Fallback to data.json
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok)throw new Error(r.status);
    proc(await r.json());
  }catch(err){
    console.error('Erreur chargement:', err);
    document.getElementById('grid').innerHTML=
      `<div class="empty"><div class="empty-ico">😶</div>
       <div class="empty-ttl">data.json introuvable</div>
       <div class="empty-sub">Vérifie que le fichier est bien à la racine du repo.</div></div>`;
  }
}

function proc(raw){
  const arr=Array.isArray(raw)?raw:(raw.games||[]);
  ALL=arr.map((g,i)=>({
    _idx:i,id:g.title||String(i),
    name:g.title||'Sans titre',year:g.year||'',
    categories:Array.isArray(g.categories)?g.categories:[],description:g.description||'',
    portrait_url:g.portrait_url||null,banner_url:g.banner_url||null,
    magnets:Array.isArray(g.magnets)?g.magnets:[],
    ytb_id:g.ytb_id||null,added_at:g.added_at||null,
  }));
  buildGenres();applyFilters();
}

function pImg(g){return g.portrait_url||null;}
function bImg(g){return g.banner_url||g.portrait_url||null;}

/* genres */
function buildGenres(){
  const cats=new Set();
  ALL.forEach(g=>{
    if(g.categories?.length){
      g.categories.forEach(c=>cats.add(c));
    }
  });
  let h=`<button class="gtab on" id="gt_all" onclick="setGenre('all')">Tous</button>`;
  cats.forEach(k=>h+=`<button class="gtab" id="gt_${sid(k)}" onclick="setGenre('${e(k)}')">${e(k)}</button>`);
  document.getElementById('gtabs').innerHTML=h;
}
function setGenre(g){
  aGenre=g;
  document.querySelectorAll('.gtab').forEach(b=>b.classList.remove('on'));
  document.getElementById('gt_'+(g==='all'?'all':sid(g)))?.classList.add('on');
  pg=1;applyFilters();
}

/* sort */
function setSort(s){
  aSort=s;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));
  document.getElementById('sort-'+s)?.classList.add('on');
  pg=1;applyFilters();
}

/* filter + sort */
function applyFilters(){
  const q=(document.getElementById('cq')?.value||'').toLowerCase().trim();
  FIL=ALL.filter(g=>{
    const gm=aGenre==='all'||g.categories?.includes(aGenre);
    const nm=!q||g.name.toLowerCase().includes(q);
    return gm&&nm;
  });
  if(aSort==='new') FIL.sort((a,b)=>new Date(b.added_at||0)-new Date(a.added_at||0));
  else              FIL.sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  pg=1;renderGrid();renderPag();
  document.getElementById('res-count').textContent=FIL.length+' jeu'+(FIL.length>1?'x':'');
}

/* grid */
function renderGrid(){
  const slice=FIL.slice((pg-1)*PPG,pg*PPG),gr=document.getElementById('grid');
  if(!slice.length){
    gr.innerHTML=`<div class="empty"><div class="empty-ico">🎮</div>
      <div class="empty-ttl">Aucun jeu trouvé</div>
      <div class="empty-sub">Essaie un autre genre ou efface le filtre.</div></div>`;
    return;
  }
  gr.innerHTML=slice.map(card).join('');
}

function card(g){
  const img=pImg(g);
  return`<div class="card" onclick="location.href='jeux.html?id=${e2(g.id)}'" style="cursor:pointer">
    <div class="card-img">
      ${img?`<img src="${e(img)}" alt="${e(g.name)}" loading="lazy">`:`<div class="card-noimg">🎮</div>`}
      ${g.year?`<div class="card-yr">${e(g.year)}</div>`:''}
      ${g.categories?.length?`<div class="card-cat">${e(g.categories[0])}${g.categories.length>1?'+':''}</div>`:''}
      <div class="card-play"><div class="card-play-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>
      </div></div>
      <div class="card-info">
        <div class="card-name">${e(g.name)}</div>
        <div class="card-sub">
          ${g.year?`<span>${e(g.year)}</span>`:''}
          ${g.year&&g.categories?.length?`<span>·</span>`:''}
          ${g.categories?.length?`<span>${e(g.categories.join(', '))}</span>`:''}
        </div>
      </div>
    </div>
  </div>`;
}

/* pagination */
function renderPag(){
  const t=Math.ceil(FIL.length/PPG),el=document.getElementById('pag');
  if(t<=1){el.innerHTML='';return;}
  let h=`<button class="pb ${pg===1?'off':''}" onclick="gp(${pg-1})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>`;
  pr(pg,t).forEach(p=>p==='…'?h+=`<span class="pb" style="cursor:default;opacity:.3">…</span>`:h+=`<button class="pb ${p===pg?'cur':''}" onclick="gp(${p})">${p}</button>`);
  h+=`<button class="pb ${pg===t?'off':''}" onclick="gp(${pg+1})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>`;
  el.innerHTML=h;
}
function pr(c,t){if(t<=7)return Array.from({length:t},(_,i)=>i+1);const r=[];if(c>3){r.push(1);if(c>4)r.push('…');}for(let i=Math.max(1,c-2);i<=Math.min(t,c+2);i++)r.push(i);if(c<t-2){if(c<t-3)r.push('…');r.push(t);}return r;}
function gp(p){const t=Math.ceil(FIL.length/PPG);if(p<1||p>t)return;pg=p;renderGrid();renderPag();window.scrollTo({top:0,behavior:'smooth'});}

/* modal */
function openMod(id){
  const g=ALL.find(g=>g.id===id);if(!g)return;
  _cur=g;
  document.getElementById('m-title').textContent=g.name;
  let pills='';
  if(g.year)     pills+=`<span class="mp-yr">${e(g.year)}</span>`;
  if(g.categories?.length) pills+=g.categories.map(c=>`<span class="mp-cat">${e(c)}</span>`).join('');
  if(g.added_at) pills+=`<span class="m-sep">·</span><span class="mp-date">Ajouté ${fd(g.added_at)}</span>`;
  document.getElementById('m-pills').innerHTML=pills;
  document.getElementById('m-desc').textContent=g.description||'Aucune description disponible.';

  const mi=document.getElementById('m-img'),mn=document.getElementById('m-noimg');
  const mt=document.getElementById('m-trailer'),mb=document.getElementById('m-ytbtn');
  mt.innerHTML='';mt.style.display='none';
  if(bImg(g)){mi.src=bImg(g);mi.style.display='block';mn.style.display='none';}
  else{mi.style.display='none';mn.style.display='flex';}
  mb.style.display=g.ytb_id?'flex':'none';

  let acts='';
  if(g.ytb_id){
    acts+=`<button class="btn-w" onclick="openTrailer()"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>Voir le trailer</button>`;
  } else {
    acts+=`<span class="btn-g" style="opacity:.3;cursor:default;pointer-events:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m10 15 5-3-5-3z"/></svg>Pas de trailer</span>`;
  }
  if(g.magnets.length){
    acts+=`<button class="btn-p" onclick="document.getElementById('m-mag-sec').scrollIntoView({behavior:'smooth',block:'nearest'})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="22"/></svg>Télécharger</button>`;
  }
  document.getElementById('m-actions').innerHTML=acts;

  const ms=document.getElementById('m-mag-sec'),ml=document.getElementById('m-mag-list');
  ms.style.display='block';
  if(g.magnets.length){
    ml.innerHTML=g.magnets.map((m,i)=>`
      <a class="m-mag-item" href="${e(m)}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="22"/></svg>
        ${g.magnets.length>1?'Source '+(i+1)+' — ':''}Télécharger via Crackuzu
      </a>`).join('');
  } else {
    ml.innerHTML='<div class="m-mag-empty">Aucun lien de téléchargement disponible.</div>';
  }
  document.getElementById('mov').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('modal-box').scrollTop=0;
}

function openTrailer(){
  if(!_cur?.ytb_id)return;
  const mi=document.getElementById('m-img'),mb=document.getElementById('m-ytbtn');
  const mt=document.getElementById('m-trailer');
  mi.style.display='none';mb.style.display='none';
  mt.style.display='block';
  mt.innerHTML=`<iframe src="https://www.youtube.com/embed/${_cur.ytb_id}?autoplay=1&rel=0&modestbranding=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
}
function closeMod(){
  document.getElementById('mov').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('m-trailer').innerHTML='';
  document.getElementById('m-trailer').style.display='none';
  _cur=null;
}

/* search */
function openSrch(){document.getElementById('sov').classList.add('open');document.body.style.overflow='hidden';setTimeout(()=>document.getElementById('sinput').focus(),50);}
function closeSrch(){document.getElementById('sov').classList.remove('open');document.body.style.overflow='';document.getElementById('sinput').value='';document.getElementById('sres').innerHTML='';}
function doSrch(q){
  const r=document.getElementById('sres');
  if(!q.trim()){r.innerHTML='';return;}
  const m=ALL.filter(g=>g.name.toLowerCase().includes(q.toLowerCase())).slice(0,20);
  if(!m.length){r.innerHTML=`<div class="sempty">Aucun résultat pour « ${e(q)} »</div>`;return;}
  r.innerHTML=m.map(g=>{
    const img=pImg(g);
    return`<div class="sri" onclick="closeSrch();location.href='jeux.html?id=${e2(g.id)}'" style="cursor:pointer">
      ${img?`<img class="sri-cov" src="${e(img)}" alt="${e(g.name)}" loading="lazy">`:`<div class="sri-cov" style="background:linear-gradient(135deg,#1a1210,#0a0a0a);display:flex;align-items:center;justify-content:center;font-size:1.5rem">🎮</div>`}
      <div class="sri-info">
        <div class="sri-name">${e(g.name)}</div>
        <div class="sri-meta">${e(g.categories?.join(', ')||'—')} · ${e(g.year||'—')} · ${fd(g.added_at)}</div>
      </div>
      <div class="sri-arr"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div>
    </div>`;
  }).join('');
}

window.addEventListener('scroll',()=>document.getElementById('hdr').classList.toggle('scrolled',scrollY>40));
document.addEventListener('keydown',ev=>{if(ev.key==='Escape'){closeSrch();closeMod();}});

function fd(s){if(!s)return'—';const d=new Date(s);return isNaN(d)?'—':d.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}
function e(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function e2(s){return e(s).replace(/&#39;/g,"\\'");}
function sid(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}

init();
</script>
</body>
</html>
