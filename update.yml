name: Update Games Database

on:
  schedule:
    # Every hour
    - cron: '0 * * * *'
  workflow_dispatch:
    # Allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to git push

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run update script
        env:
          STEAMGRIDDB_API_KEY: ${{ secrets.STEAMGRIDDB_API_KEY }}
        run: node scripts/update.js

      - name: Commit & push if changed
        run: |
          git config user.email "bot@crackuzu.github"
          git config user.name "CrackUZU Bot"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update games database [$(date -u +'%Y-%m-%d %H:%M')] 🎮"
          git push
