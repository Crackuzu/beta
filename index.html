<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="CRACKUZU – Répertoire de jeux PC via Crackuzu.">
<meta name="theme-color" content="#000000">
<link rel="icon" type="image/png" href="logo.png">
<title>CRACKUZU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════════════════════
   RESET & BASE
══════════════════════════════════════════════════════════ */
*,:before,:after{box-sizing:border-box;border-width:0;border-style:solid;border-color:#333}
html{line-height:1.5;-webkit-text-size-adjust:100%;tab-size:4;font-family:Inter,system-ui,-apple-system,sans-serif;-webkit-tap-highlight-color:transparent;scroll-behavior:smooth}
body{margin:0;line-height:inherit;background:#000;color:#fff;font-family:Inter,system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;overflow-x:hidden}
a{color:inherit;text-decoration:inherit}
button{font-family:inherit;font-size:100%;font-weight:inherit;line-height:inherit;color:inherit;margin:0;padding:0;cursor:pointer;background:transparent;border-width:0;-webkit-appearance:button}
h1,h2,h3,p{margin:0}
ul{list-style:none;margin:0;padding:0}
input{font-family:inherit;font-size:100%;color:inherit;margin:0;padding:0}
img,svg{display:block;vertical-align:middle}
img{max-width:100%;height:auto}
textarea,select{font:inherit;color:inherit}
:root{--orange:#f97316;--orange-dim:rgba(249,115,22,.1);--w5:rgba(255,255,255,.05);--w10:rgba(255,255,255,.10);--w20:rgba(255,255,255,.20);--w40:rgba(255,255,255,.40)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#f97316;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#ea580c}
::selection{background:rgba(249,115,22,.3);color:#fff}

/* ══════════════════════════════════════════════════════════
   HEADER (permanent, jamais rechargé)
══════════════════════════════════════════════════════════ */
.header{position:fixed;top:0;left:0;right:0;z-index:10003;transition:all .5s;background:linear-gradient(to bottom,rgba(0,0,0,.6),rgba(0,0,0,.1),transparent)}
.header.scrolled{background:rgba(0,0,0,.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,.08)}
.nav{max-width:2000px;margin:0 auto}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:68px}
@media(min-width:768px){.nav-inner{padding:0 2.5rem}}
@media(min-width:1024px){.nav-inner{padding:0 4rem}}
.logo-link{display:flex;align-items:center;gap:.75rem;flex-shrink:0;cursor:pointer}
.logo-text{font-size:1.875rem;font-weight:900;letter-spacing:-.08em;line-height:1;user-select:none;text-transform:uppercase}
.logo-dim{color:rgba(255,255,255,.4)}
.nav-links{display:none}
@media(min-width:1024px){.nav-links{display:flex;align-items:center}}
.nav-links ul{display:flex;align-items:center;gap:.5rem;list-style:none;margin:0;padding:0}
.nav-a{padding:.5rem 1rem;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;border-radius:9999px;transition:all .3s;border:1px solid transparent;color:rgba(255,255,255,.4);cursor:pointer;background:none}
.nav-a:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.nav-a.active{color:#fff}
.nav-right{display:flex;align-items:center;gap:.75rem}
.search-pill{display:none;align-items:center;gap:.75rem;padding:.5rem 1rem;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);transition:all .3s;cursor:pointer;color:rgba(255,255,255,.4)}
@media(min-width:768px){.search-pill{display:flex}}
.search-pill:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
.search-pill span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.15em}
.icon-btn{width:40px;height:40px;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;transition:all .3s;color:rgba(255,255,255,.7);cursor:pointer}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff}

/* ══════════════════════════════════════════════════════════
   FOOTER (permanent)
══════════════════════════════════════════════════════════ */
.site-footer{border-top:1px solid rgba(255,255,255,.05);padding:3rem 1.5rem;text-align:center;background:#000}
.ft{font-size:1.5rem;font-weight:900;letter-spacing:-.06em;text-transform:uppercase;margin-bottom:.5rem}
.ft .dim{color:rgba(255,255,255,.2)}
.fts{font-size:12px;color:rgba(255,255,255,.2);max-width:420px;margin:0 auto .75rem;font-weight:600}
.ftn{font-size:10px;color:rgba(255,255,255,.1);letter-spacing:.1em;text-transform:uppercase;margin:0}

/* ══════════════════════════════════════════════════════════
   TRANSITION DE PAGE
══════════════════════════════════════════════════════════ */
#spa-view{transition:opacity .15s ease}
#spa-view.fading{opacity:0}

/* Morph transition */
.morph-clone{position:fixed;z-index:9999;overflow:hidden;pointer-events:none;box-shadow:0 25px 50px -12px rgba(0,0,0,.5);will-change:left,top,width,height,border-radius;-webkit-transition:left .7s cubic-bezier(.16,1,.3,1),top .7s cubic-bezier(.16,1,.3,1),width .7s cubic-bezier(.16,1,.3,1),height .7s cubic-bezier(.16,1,.3,1),border-radius .7s cubic-bezier(.16,1,.3,1);transition:left .7s cubic-bezier(.16,1,.3,1),top .7s cubic-bezier(.16,1,.3,1),width .7s cubic-bezier(.16,1,.3,1),height .7s cubic-bezier(.16,1,.3,1),border-radius .7s cubic-bezier(.16,1,.3,1)}
.morph-clone img{width:100%;height:100%;object-fit:cover;display:block}
.morph-clone::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,#000 0%,rgba(0,0,0,.7) 40%,rgba(0,0,0,.3) 100%);pointer-events:none;opacity:0;transition:opacity 1.2s cubic-bezier(.16,1,.3,1)}
.morph-clone::before{content:"";position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 50%,transparent 100%);pointer-events:none;z-index:1;opacity:0;transition:opacity 1.2s cubic-bezier(.16,1,.3,1)}
.morph-clone.morphing::after,.morph-clone.morphing::before{opacity:1}
body.morph-active #spa-view{background:#000!important;min-height:100vh}
body.morph-active .hero-content{position:relative;z-index:100000!important}
body.morph-active .back-btn{z-index:100001!important}

/* ══════════════════════════════════════════════════════════
   CSS — ACCUEIL (index)
══════════════════════════════════════════════════════════ */


.nav{max-width:2000px;margin:0 auto}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:68px}
@media(min-width:768px){.nav-inner{padding:0 2.5rem}}
@media(min-width:1024px){.nav-inner{padding:0 4rem}}
.logo-link{display:flex;align-items:center;gap:.75rem;flex-shrink:0}
.logo-text{font-size:1.875rem;font-weight:900;letter-spacing:-.08em;line-height:1;user-select:none;text-transform:uppercase}
.logo-dim{color:rgba(255,255,255,.4)}
.nav-links{display:none}
@media(min-width:1024px){.nav-links{display:flex;align-items:center}}
.nav-links ul{display:flex;align-items:center;gap:.5rem}
.nav-a{padding:.5rem 1rem;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;border-radius:9999px;transition:all .3s;border:1px solid transparent;color:rgba(255,255,255,.4)}
.nav-a:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.nav-a.active{color:#fff}
.nav-right{display:flex;align-items:center;gap:.75rem}
.search-pill{display:none;align-items:center;gap:.75rem;padding:.5rem 1rem;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);transition:all .3s;cursor:pointer;color:rgba(255,255,255,.4)}
@media(min-width:768px){.search-pill{display:flex}}
.search-pill:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
.search-pill span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.15em}
.icon-btn{width:40px;height:40px;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;transition:all .3s;color:rgba(255,255,255,.7)}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff}

/* HERO */
.hero{position:relative;height:100vh;width:100%;overflow:hidden;background:#000;user-select:none}
.hero-slides{position:absolute;inset:0}
.slide{position:absolute;inset:0;transition:opacity 1.5s ease-in-out;opacity:0;z-index:0}
.slide.active{opacity:1;z-index:10}
.slide img{width:100%;height:100%;object-fit:cover;transition:transform 1.5s ease-out;transform:scale(1.15)}
.slide.active img{transform:scale(1.05) rotate(.01deg)}
.hero-gl{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.9),rgba(0,0,0,.5),transparent);z-index:20}
.hero-gb{position:absolute;inset:0;background:linear-gradient(to top,#000,rgba(0,0,0,.2),transparent);z-index:20}
.hero-gt{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.4),transparent,transparent);z-index:20}
.hero-body{position:relative;height:100%;display:flex;align-items:flex-end;padding-bottom:14rem;z-index:30}
@media(min-width:1024px){.hero-body{align-items:center;padding-bottom:0}}
.hero-inner{max-width:2000px;margin:0 auto;padding:0 1.5rem;width:100%}
@media(min-width:768px){.hero-inner{padding:0 2.5rem}}
@media(min-width:1024px){.hero-inner{padding:0 4rem}}
.hero-info{max-width:32rem;display:flex;flex-direction:column;gap:1.25rem;padding-left:6rem;padding-bottom:14rem}
.hero-badges{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem}
.badge-new{display:flex;align-items:center;gap:.375rem;background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.2);padding:.25rem .5rem;border-radius:.25rem}
.badge-new span{color:#f97316;font-size:11px;font-weight:900;letter-spacing:.2em;text-transform:uppercase}
.badge-src{font-size:10px;font-weight:700;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.15em;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);padding:.2rem .5rem;border-radius:.25rem}
.hero-title-wrap{min-height:140px;display:flex;align-items:flex-end}
.hero-title{font-size:2.5rem;font-weight:900;letter-spacing:-.04em;line-height:1;text-transform:uppercase}
@media(min-width:768px){.hero-title{font-size:3.5rem}}
.hero-meta{display:flex;flex-wrap:wrap;gap:1rem}
.hm{font-size:11px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.1em}
.hsep{color:rgba(255,255,255,.2)}
.hero-actions{display:flex;flex-wrap:wrap;gap:1rem;padding-top:.5rem}
.btn-orange{display:flex;align-items:center;gap:.5rem;padding:.75rem 2rem;background:#f97316;color:#fff;font-size:11px;font-weight:900;border-radius:.75rem;transition:all .3s;text-transform:uppercase;letter-spacing:.1em;border:0;cursor:pointer;text-decoration:none;white-space:nowrap}
@media(min-width:768px){.btn-orange{padding:1rem 2rem;font-size:13px;border-radius:.875rem}}
.btn-orange:hover{background:#fb923c;box-shadow:0 0 30px rgba(249,115,22,.4)}
.btn-orange:active{transform:scale(.95)}
.btn-ghost{display:flex;align-items:center;gap:.5rem;padding:.75rem 2rem;background:rgba(255,255,255,.05);backdrop-filter:blur(12px);color:#fff;font-size:11px;font-weight:900;border-radius:.75rem;border:1px solid rgba(255,255,255,.1);transition:all .3s;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;white-space:nowrap}
@media(min-width:768px){.btn-ghost{padding:1rem 2rem;font-size:13px;border-radius:.875rem}}
.btn-ghost:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2)}
.btn-ghost:active{transform:scale(.95)}
.hero-dots{position:absolute;bottom:2.5rem;left:1.5rem;z-index:40;display:flex;gap:.5rem}
@media(min-width:768px){.hero-dots{left:2.5rem}}
@media(min-width:1024px){.hero-dots{left:4rem}}
.dot{position:relative;width:40px;height:6px;border-radius:9999px;background:rgba(255,255,255,.1);overflow:hidden;cursor:pointer}
.dot-bar{height:100%;background:#f97316;width:0}
.dot-bar.run{animation:dprog 8s linear forwards}
@keyframes dprog{from{width:0}to{width:100%}}

/* CONTENT */
.content{position:relative;margin-top:1rem;z-index:20;padding-bottom:5rem;background:#000}
.section{padding:2.5rem 0;overflow:hidden;position:relative}
.section+.section{border-top:1px solid rgba(255,255,255,.05)}
.sw{max-width:2000px;margin:0 auto;padding:0 1.5rem}
@media(min-width:768px){.sw{padding:0 2.5rem}}
@media(min-width:1024px){.sw{padding:0 4rem}}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
@media(min-width:640px){.sh{margin-bottom:2rem}}
.sl{display:flex;flex-direction:column}
.se{font-size:10px;font-weight:900;color:rgba(249,115,22,.5);text-transform:uppercase;letter-spacing:.4em;margin-bottom:.25rem}
@media(min-width:640px){.se{font-size:11px}}
.st{font-size:1.25rem;font-weight:900;color:#fff;letter-spacing:-.03em;text-transform:uppercase;line-height:1}
@media(min-width:640px){.st{font-size:1.5rem}}

/* SCROLL ROW */
.row-wrap{position:relative}
.ra{position:absolute;top:50%;transform:translateY(-50%);z-index:40;width:48px;height:48px;border-radius:9999px;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);display:none;align-items:center;justify-content:center;color:#fff;opacity:0;transition:all .3s;cursor:pointer;box-shadow:0 8px 32px rgba(0,0,0,.6)}
@media(min-width:640px){.ra{display:flex}}
.row-wrap:hover .ra{opacity:1}
.ra:hover{background:#fff;color:#000}
.ra:active{transform:translateY(-50%) scale(.9)}
.ra-l{left:-1.25rem}
.ra-r{right:-1.25rem}
.row-track{display:flex;gap:1rem;overflow-x:auto;padding-bottom:2rem;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;-ms-overflow-style:none;scrollbar-width:none}
.row-track@media(min-width:640px){.row-track{gap:1.25rem}}
@media(min-width:768px){.row-track{gap:1.5rem}}

/* PORTRAIT CARD — pure image only like NAKIOS */
.pc{flex:none;width:141px;border-radius:1.125rem;overflow:hidden;border:1px solid rgba(255,255,255,.05);background:rgba(255,255,255,.03);transition:all .5s;cursor:pointer;position:relative;display:block}
@media(min-width:640px){.pc{width:176px;border-radius:1.25rem}}
@media(min-width:768px){.pc{width:220px}}
.pc:hover{transform:scale(1.03);box-shadow:0 20px 50px rgba(0,0,0,.8);border-color:rgba(255,255,255,.2)}
.pc-img{aspect-ratio:2/3;overflow:hidden;background:#111;position:relative}
.pc-img img{width:100%;height:100%;object-fit:cover;transition:all .7s}
.pc:hover .pc-img img{filter:brightness(.5);transform:scale(1.05)}
.pc-noimg{width:100%;aspect-ratio:2/3;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;align-items:center;justify-content:center;font-size:3rem}
.pc-badge{position:absolute;top:.5rem;left:.5rem;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);padding:.15rem .4rem;border-radius:.3rem;font-size:8px;font-weight:900;color:rgba(255,255,255,.9);letter-spacing:.1em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);z-index:10}
.pc-ov{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .4s;z-index:20}
.pc:hover .pc-ov{opacity:1}
.pc-info{position:absolute;left:0;right:0;bottom:0;padding:.75rem;background:linear-gradient(to top,rgba(0,0,0,.95),rgba(0,0,0,.4),transparent);opacity:0;transition:opacity .3s;z-index:20}
.pc:hover .pc-info{opacity:1}
.pc-name{font-size:10px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:-.01em;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pc-size{font-size:9px;color:rgba(255,255,255,.5);margin-top:.15rem;font-weight:600}

/* WIDE CARD */
.wc{flex:none;width:280px;border-radius:1.25rem;overflow:hidden;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.03);cursor:pointer;transition:all .5s;position:relative}
@media(min-width:640px){.wc{width:320px}}
@media(min-width:768px){.wc{width:360px}}
.wc:hover{transform:scale(1.03);border-color:rgba(255,255,255,.3);box-shadow:0 20px 50px rgba(0,0,0,.8)}
.wc-img{aspect-ratio:16/10;overflow:hidden;background:#111;position:relative}
.wc-img img{width:100%;height:100%;object-fit:cover;transition:transform .7s}
.wc:hover .wc-img img{transform:scale(1.06);filter:brightness(.4)}
.wc-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.95) 0%,rgba(0,0,0,.5) 40%,transparent 70%);opacity:0;transition:opacity .4s;z-index:5}
.wc:hover .wc-grad{opacity:1}
.wc-body{position:absolute;left:0;right:0;bottom:0;padding:1rem 1.25rem;z-index:10;opacity:0;transition:opacity .4s}
.wc:hover .wc-body{opacity:1}
.wc-name{font-size:.85rem;font-weight:900;letter-spacing:-.02em;line-height:1.3;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:.4rem;color:#fff;text-transform:uppercase}
.wc-meta{display:flex;align-items:center;gap:.5rem;font-size:9px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.12em;flex-wrap:wrap}
.wc-v{background:rgba(249,115,22,.25);color:#fb923c;padding:.15rem .5rem;border-radius:.25rem;font-size:8px;font-weight:900}

/* CARD */
.card{position:relative;border-radius:.875rem;overflow:hidden;cursor:pointer;transition:all .5s cubic-bezier(.23,1,.32,1);display:block;box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transform:translateY(20px);animation:cardSpawn .5s cubic-bezier(.23,1,.32,1) forwards}
.card:hover{transform:scale(1.035);z-index:2;box-shadow:0 20px 60px rgba(249,115,22,.15)}
@keyframes cardSpawn{to{opacity:1;transform:translateY(0)}}
.card-img{aspect-ratio:2/3;width:100%;position:relative;background:#0d0d0d;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s cubic-bezier(.23,1,.32,1)}
.card:hover .card-img img{transform:scale(1.08)}
.card-noimg{width:100%;height:100%;background:linear-gradient(135deg,#1a1210,#0a0a0a);display:flex;align-items:center;justify-content:center;font-size:3rem}
.card-yr{position:absolute;top:.5rem;left:.5rem;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);padding:.15rem .45rem;border-radius:.25rem;font-size:7px;font-weight:900;color:rgba(255,255,255,.65);letter-spacing:.12em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);z-index:10}
.card-cat{position:absolute;top:.5rem;right:.5rem;background:rgba(249,115,22,.15);border:1px solid rgba(249,115,22,.25);padding:.15rem .45rem;border-radius:.25rem;font-size:7px;font-weight:900;color:#fb923c;letter-spacing:.1em;text-transform:uppercase;z-index:10;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* SEARCH OVERLAY */
.sov{position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.95);backdrop-filter:blur(30px);display:flex;flex-direction:column;padding:6rem 1.5rem 2rem;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.16,1,.3,1);visibility:hidden;transform:scale(.98)}
.sov.open{opacity:1;pointer-events:all;visibility:visible;transform:scale(1)}
.sbox{position:relative;max-width:680px;margin:0 auto;width:100%}
.sinput{width:100%;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:1.25rem;padding:1.25rem 4rem 1.25rem 3.75rem;font-size:1.125rem;font-weight:600;color:#fff;outline:none;transition:all .3s cubic-bezier(.16,1,.3,1);font-family:Inter,sans-serif;letter-spacing:-.01em}
.sinput:focus{border-color:rgba(249,115,22,.5);background:rgba(249,115,22,.03);box-shadow:0 0 0 4px rgba(249,115,22,.08)}
.sinput::placeholder{color:rgba(255,255,255,.25);font-weight:500}
.sico{position:absolute;left:1.5rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.35);pointer-events:none;transition:all .3s}
.sov.open .sico{color:var(--orange)}
.sx{position:absolute;right:1.25rem;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:9999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center}

/* ══════════════════════════════════════════════════════════
   CSS — CATALOGUE
══════════════════════════════════════════════════════════ */
/* ── RESET ───────────────────────────────────────────────── */
h1,h2,h3,h4,h5,p{margin:0}
img,svg,iframe{display:block}

/* Utility classes */
.orange{color:#f97316}

/* ── HEADER ──────────────────────────────────────────────── */
.nav{max-width:2000px;margin:0 auto}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;height:68px}
@media(min-width:768px){.nav-inner{padding:0 2.5rem}}
@media(min-width:1024px){.nav-inner{padding:0 4rem}}
.logo-link{display:flex;align-items:center;gap:.75rem;flex-shrink:0;text-decoration:none}
.logo-text{font-size:1.875rem;font-weight:900;letter-spacing:-.08em;line-height:1;user-select:none;text-transform:uppercase;color:#fff}
.logo-dim{color:rgba(255,255,255,.4)}
.nav-links{display:none}
@media(min-width:1024px){.nav-links{display:flex;align-items:center}}
.nav-links ul{display:flex;align-items:center;gap:.5rem}
.nav-a{padding:.5rem 1rem;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;border-radius:9999px;transition:all .3s;border:1px solid transparent;color:rgba(255,255,255,.4);text-decoration:none}
.nav-a:hover{color:rgba(255,255,255,.8);background:rgba(255,255,255,.05)}
.nav-a.active{color:#fff}
.nav-right{display:flex;align-items:center;gap:.75rem}
.search-pill{display:none;align-items:center;gap:.75rem;padding:.5rem 1rem;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);transition:all .3s;cursor:pointer;color:rgba(255,255,255,.4)}
@media(min-width:768px){.search-pill{display:flex}}
.search-pill:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff}
.search-pill span{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.15em}
.icon-btn{width:40px;height:40px;border-radius:9999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;transition:all .3s;color:rgba(255,255,255,.7)}
.icon-btn:hover{background:rgba(255,255,255,.1);color:#fff}

/* ── PAGE ────────────────────────────────────────────────── */
.page{min-height:100vh;background:#000;padding-top:68px;padding-bottom:5rem;position:relative;overflow-x:hidden}
.glow-l{position:fixed;top:0;left:25%;width:500px;height:300px;background:rgba(249,115,22,.05);filter:blur(120px);transform:translateY(-50%);pointer-events:none;z-index:0}
.glow-r{position:fixed;top:0;right:25%;width:400px;height:250px;background:rgba(249,115,22,.05);filter:blur(120px);transform:translateY(-50%);pointer-events:none;z-index:0}
.container{max-width:2000px;margin:0 auto;padding:2rem 1.5rem 4rem;position:relative;z-index:10}
@media(min-width:768px){.container{padding:2.5rem 2.5rem 4rem}}
@media(min-width:1024px){.container{padding:3rem 4rem 4rem}}

/* ── PAGE HEADER ─────────────────────────────────────────── */
.page-head{margin-bottom:3rem}
.page-title{font-size:3rem;font-weight:900;text-transform:uppercase;letter-spacing:-.05em;line-height:1}
@media(min-width:768px){.page-title{font-size:3.9rem}}
.page-title-inner{color:#fff}
.page-sub{color:var(--w40);font-size:1.05rem;font-weight:500;line-height:1.6;max-width:43rem;margin-top:.75rem}

/* ── FILTERS ─────────────────────────────────────────────── */
.filters{margin-bottom:2.4rem;display:flex;flex-direction:column;gap:1.2rem}

/* genre bar */
.genre-bar{display:flex;align-items:center;gap:.45rem;padding:.45rem;border-radius:9999px;border:1px solid var(--w10);background:var(--w5);backdrop-filter:blur(8px);width:100%;max-width:100%;flex-wrap:wrap}
.gtab{padding:.42rem 1.2rem;border-radius:9999px;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;transition:all .25s;cursor:pointer;color:var(--w40);border:0;background:none;white-space:nowrap;flex-shrink:0;min-width:110px;text-align:center;overflow:hidden;text-overflow:ellipsis}
.gtab:hover{color:rgba(255,255,255,.8);background:var(--w5)}
.gtab.on{background:#fff;color:#000;box-shadow:0 0 20px rgba(255,255,255,.05)}

/* bottom row */
.filter-row{display:flex;align-items:center;justify-content:space-between;gap:1.05rem;flex-wrap:wrap}
.fl-left{display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;width:100%}
@media(max-width:640px){.fl-left{flex-direction:column;align-items:stretch}.inline-srch{max-width:none}}

/* sort pill */
.sort-pill{display:flex;align-items:center;gap:.3rem;padding:.36rem;border-radius:.75rem;border:1px solid var(--w10);background:var(--w5);backdrop-filter:blur(8px)}
.stab{padding:.54rem 1.05rem;border-radius:.55rem;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.2em;transition:all .25s;cursor:pointer;color:var(--w40);border:1px solid transparent;background:none;white-space:nowrap}
.stab:hover{color:#fff;border-color:var(--w20)}
.stab.on{background:#fff;color:#000;border-color:#fff}

/* inline search */
.inline-srch{display:flex;align-items:center;gap:.75rem;padding:.6rem 1.05rem;border-radius:.875rem;border:1px solid var(--w10);background:var(--w5);backdrop-filter:blur(8px);flex:1;max-width:384px}
.inline-srch svg{flex-shrink:0;color:var(--w40)}
.inline-srch input{background:none;border:0;outline:none;font-size:.975rem;color:#fff;width:100%;font-weight:600}
.inline-srch input::placeholder{color:var(--w40)}

/* count */
.res-count{font-size:11.5px;font-weight:900;text-transform:uppercase;letter-spacing:.3em;color:rgba(255,255,255,.18)}

/* filter button & dropdown */
.fl-right{display:flex;align-items:center;gap:.75rem;position:relative}
.filter-btn{display:flex;align-items:center;gap:.5rem;padding:.6rem 1.2rem;border-radius:9999px;border:1px solid var(--w10);background:var(--w5);backdrop-filter:blur(8px);color:#fff;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;transition:all .25s}
.filter-btn:hover{background:var(--w10);border-color:var(--w20)}
.filter-btn svg{color:var(--w40)}
.filter-dropdown{position:absolute;top:calc(100% + .5rem);right:0;width:260px;background:rgba(10,10,10,.98);border:1px solid var(--w10);border-radius:1rem;padding:1.25rem;backdrop-filter:blur(20px);opacity:0;pointer-events:none;transform:translateY(-10px);transition:all .2s;z-index:100;box-shadow:0 20px 60px rgba(0,0,0,.8)}
.filter-dropdown.open{opacity:1;pointer-events:all;transform:translateY(0)}
.filter-dropdown-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;padding-bottom:.75rem;border-bottom:1px solid var(--w10)}
.filter-dropdown-header span{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.15em;color:var(--w40)}
.filter-dropdown-body{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin-bottom:1rem}
.filter-cat-btn{padding:.6rem .75rem;border-radius:.5rem;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;border:1px solid var(--w10);background:var(--w5);color:var(--w40);cursor:pointer;transition:all .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.filter-cat-btn:hover{border-color:var(--w20);color:rgba(255,255,255,.8)}
.filter-cat-btn.active{background:#fff;color:#000;border-color:#fff;box-shadow:0 0 20px rgba(255,255,255,.1)}
.filter-dropdown-footer{display:flex;flex-direction:column;gap:.5rem;padding-top:1rem;border-top:1px solid var(--w10)}
.filter-reset{width:100%;padding:.875rem;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.2em;color:var(--w40);background:none;border:none;cursor:pointer;transition:all .2s}
.filter-reset:hover{color:var(--orange)}
.filter-apply{width:100%;padding:.875rem;background:#fff;color:#000;border-radius:.75rem;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.15em;cursor:pointer;transition:all .2s;border:none;box-shadow:0 4px 20px rgba(255,255,255,.1)}
.filter-apply:hover{background:rgba(255,255,255,.9)}

/* ── GRID ────────────────────────────────────────────────── */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem}
@media(min-width:480px){.grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:640px){.grid{grid-template-columns:repeat(4,1fr);gap:1.25rem}}
@media(min-width:1024px){.grid{grid-template-columns:repeat(5,1fr);gap:1.5rem}}
@media(min-width:1280px){.grid{grid-template-columns:repeat(6,1fr)}}

/* ── CARD ────────────────────────────────────────────────── */
.card{position:relative;border-radius:.875rem;overflow:hidden;cursor:pointer;transition:all .5s cubic-bezier(.23,1,.32,1);display:block;box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transform:translateY(20px);animation:cardSpawn .5s cubic-bezier(.23,1,.32,1) forwards}
.card:hover{transform:scale(1.035);z-index:2;box-shadow:0 20px 60px rgba(249,115,22,.4)}
@keyframes cardSpawn{to{opacity:1;transform:translateY(0)}}
.card-img{aspect-ratio:2/3;width:100%;position:relative;background:#0d0d0d;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s cubic-bezier(.23,1,.32,1)}
.card:hover .card-img img{transform:scale(1.08)}
.card-noimg{width:100%;height:100%;background:linear-gradient(135deg,#1a1210,#0a0a0a);display:flex;align-items:center;justify-content:center;font-size:3rem}
/* badges */
.card-yr{position:absolute;top:.5rem;left:.5rem;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);padding:.15rem .45rem;border-radius:.25rem;font-size:7px;font-weight:900;color:rgba(255,255,255,.65);letter-spacing:.12em;text-transform:uppercase;border:1px solid rgba(255,255,255,.1);z-index:10}
.card-cat{position:absolute;top:.5rem;right:.5rem;background:var(--orange-dim);border:1px solid rgba(249,115,22,.25);padding:.15rem .45rem;border-radius:.25rem;font-size:7px;font-weight:900;color:#fb923c;letter-spacing:.1em;text-transform:uppercase;z-index:10;max-width:72px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ── EMPTY / LOADER ──────────────────────────────────────── */
.empty{grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6rem 2rem;gap:1rem;text-align:center}
.empty-ico{font-size:3rem;opacity:.25}
.empty-ttl{font-size:1rem;font-weight:900;text-transform:uppercase;letter-spacing:-.02em;color:rgba(255,255,255,.25)}
.empty-sub{font-size:.8125rem;color:rgba(255,255,255,.18);font-weight:500}
.loader{grid-column:1/-1;display:flex;align-items:center;justify-content:center;padding:5rem;gap:1rem}
.spin{width:26px;height:26px;border:2px solid rgba(249,115,22,.2);border-top-color:#f97316;border-radius:9999px;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-txt{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.3em;color:rgba(255,255,255,.18)}

/* ── PAGINATION ──────────────────────────────────────────── */
.pag{display:flex;justify-content:center;align-items:center;gap:.375rem;margin-top:3rem;padding-top:2rem;border-top:1px solid rgba(255,255,255,.05)}
.pb{min-width:36px;height:36px;border-radius:.5rem;border:1px solid var(--w10);background:var(--w5);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--w40);cursor:pointer;transition:all .2s;padding:0 .5rem}
.pb:hover{border-color:var(--w20);color:#fff}
.pb.cur{background:var(--orange);border-color:var(--orange);color:#fff;box-shadow:0 0 20px rgba(249,115,22,.3)}
.pb.off{opacity:.25;pointer-events:none}

/* ── SEARCH OVERLAY ──────────────────────────────────────── */
.sov{position:fixed;inset:0;z-index:10001;background:rgba(0,0,0,.95);backdrop-filter:blur(30px);display:flex;flex-direction:column;padding:6rem 1.5rem 2rem;opacity:0;pointer-events:none;transition:all .4s cubic-bezier(.16,1,.3,1);visibility:hidden;transform:scale(.98)}
.sov.open{opacity:1;pointer-events:all;visibility:visible;transform:scale(1)}
.sbox{position:relative;max-width:680px;margin:0 auto;width:100%}
.sinput{width:100%;background:rgba(255,255,255,.04);border:2px solid rgba(255,255,255,.08);border-radius:1.25rem;padding:1.25rem 4rem 1.25rem 3.75rem;font-size:1.125rem;font-weight:600;color:#fff;outline:none;transition:all .3s cubic-bezier(.16,1,.3,1);font-family:Inter,sans-serif;letter-spacing:-.01em}
.sinput:focus{border-color:rgba(249,115,22,.5);background:rgba(249,115,22,.03);box-shadow:0 0 0 4px rgba(249,115,22,.08)}
.sinput::placeholder{color:rgba(255,255,255,.25);font-weight:500}
.sico{position:absolute;left:1.5rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.35);pointer-events:none;transition:all .3s}
.sov.open .sico{color:var(--orange)}
.sx{position:absolute;right:1.25rem;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:9999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);cursor:pointer;transition:all .25s;display:flex;align-items:center;justify-content:center}
.sx:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.2);color:#fff;transform:translateY(-50%) scale(1.05)}
.sres{max-width:1400px;margin:2rem auto 0;display:grid;grid-template-columns:repeat(2,1fr);gap:1.125rem;overflow-y:auto;max-height:calc(100vh - 18rem);padding-bottom:2rem}
@media(min-width:640px){.sres{grid-template-columns:repeat(3,1fr);gap:1.25rem}}
@media(min-width:1024px){.sres{grid-template-columns:repeat(5,1fr);gap:1.5rem}}
@media(min-width:1280px){.sres{grid-template-columns:repeat(6,1fr);gap:1.625rem}}
.sempty{text-align:center;padding:4rem 2rem;color:rgba(255,255,255,.2);font-size:.9rem;font-weight:600;letter-spacing:-.01em;grid-column:1/-1}

/* ── MODAL ───────────────────────────────────────────────── */
.mov{position:fixed;inset:0;z-index:10002;background:rgba(0,0,0,.9);backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:center;padding:1rem;opacity:0;pointer-events:none;transition:opacity .3s;visibility:hidden}
.mov.open{opacity:1;pointer-events:all;visibility:visible}
.modal{background:#0d0d0d;border:1px solid rgba(255,255,255,.08);border-radius:1.5rem;width:100%;max-width:820px;max-height:90vh;overflow-y:auto;transform:translateY(24px) scale(.97);transition:transform .35s cubic-bezier(.34,1.56,.64,1);scrollbar-width:none}
.modal.mov.open .modal{transform:translateY(0) scale(1)}
.m-banner{position:relative;width:100%;aspect-ratio:16/9;background:#0a0a0a;overflow:hidden;border-radius:1.5rem 1.5rem 0 0}
.m-banner img{width:100%;height:100%;object-fit:cover}
.m-banner iframe{width:100%;height:100%;border:0}
.m-banner-grad{position:absolute;inset:0;background:linear-gradient(to top,#0d0d0d 0%,rgba(13,13,13,.2) 50%,transparent 100%);pointer-events:none}
.m-close{position:absolute;top:.875rem;right:.875rem;width:34px;height:34px;border-radius:9999px;background:rgba(13,13,13,.85);border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);cursor:pointer;transition:all .2s;z-index:10;backdrop-filter:blur(8px)}
.m-close:hover{background:var(--w10);color:#fff}
.m-yt-btn{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:5}
.m-yt-inner{width:64px;height:64px;border-radius:9999px;background:rgba(255,255,255,.12);backdrop-filter:blur(8px);border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;transition:all .2s}
.m-yt-inner:hover{background:rgba(255,255,255,.22);transform:scale(1.08)}
.m-yt-inner svg{margin-left:4px}
.m-body{padding:1.25rem 1.5rem 2rem}
@media(min-width:640px){.m-body{padding:1.5rem 2rem 2.25rem}}
.m-title{font-size:1.5rem;font-weight:900;letter-spacing:-.04em;text-transform:uppercase;line-height:1;margin-bottom:.75rem}
@media(min-width:640px){.m-title{font-size:1.875rem}}
.m-pills{display:flex;flex-wrap:wrap;align-items:center;gap:.375rem;margin-bottom:1rem}
.mp-yr{background:var(--w5);color:rgba(255,255,255,.5);font-size:9.5px;font-weight:800;padding:.2rem .55rem;border-radius:.3rem;text-transform:uppercase;letter-spacing:.12em;border:1px solid var(--w10)}

/* ══════════════════════════════════════════════════════════
   CSS — JEU (jeux)
══════════════════════════════════════════════════════════ */

/* ════════════════════════════════════════════════════════════
   ANIMATIONS & KEYFRAMES
   ════════════════════════════════════════════════════════════ */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(40px) scale(0.95);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

@keyframes fadeInScale {
  from {
    opacity: 0;
    transform: scale(0.8) rotate(-2deg);
  }
  to {
    opacity: 1;
    transform: scale(1) rotate(0);
  }
}

@keyframes slideInLeft {
  from {
    opacity: 0;
    transform: translateX(-60px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(60px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes popIn {
  0% {
    opacity: 0;
    transform: scale(0) translateY(20px);
  }
  60% {
    transform: scale(1.05) translateY(-5px);
  }
  100% {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
}

@keyframes float {
  0%, 100% {
    transform: translateY(0) rotate(0deg);
  }
  25% {
    transform: translateY(-10px) rotate(1deg);
  }
  50% {
    transform: translateY(-5px) rotate(0deg);
  }
  75% {
    transform: translateY(-15px) rotate(-1deg);
  }
}

@keyframes pulse {
  0%, 100% {
    box-shadow: 0 0 0 0 rgba(249,115,22,.4);
  }
  50% {
    box-shadow: 0 0 0 15px rgba(249,115,22,0);
  }
}

@keyframes shimmer {
  0% {
    background-position: -200% 0;
  }
  100% {
    background-position: 200% 0;
  }
}

@keyframes bounce {
  0%, 100% {
    transform: translateY(0);
  }
  50% {
    transform: translateY(-8px);
  }
}

/* Animation classes */
.animate-pop {
  animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

.animate-fade-up {
  animation: fadeInUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.animate-slide-left {
  animation: slideInLeft 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.animate-slide-right {
  animation: slideInRight 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
}

.animate-scale {
  animation: fadeInScale 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
}

/* Stagger delays */
.delay-1 { animation-delay: 0.1s; }
.delay-2 { animation-delay: 0.2s; }
.delay-3 { animation-delay: 0.3s; }
.delay-4 { animation-delay: 0.4s; }
.delay-5 { animation-delay: 0.5s; }
.delay-6 { animation-delay: 0.6s; }

/* Start hidden before animation */
.anim-hidden {
  opacity: 0;
}

.hero-bg::before{content:"";position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.9) 0%,rgba(0,0,0,.4) 50%,transparent 100%)}

.back-btn{position:absolute;top:100px;left:1.5rem;z-index:50;display:flex;align-items:center;gap:.5rem;padding:.75rem 1.25rem;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.1);border-radius:9999px;color:#fff;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;transition:all .25s;cursor:pointer}

.hero-content{position:relative;z-index:10;max-width:2000px;margin:0 auto;width:100%;padding:0 1.5rem}

.genres{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1.5rem}

.genre.visible{opacity:1;transform:scale(1)}
.genre:hover{background:rgba(249,115,22,.2);border-color:var(--orange);color:#fff;transform:scale(1.1) translateY(-3px);box-shadow:0 10px 25px rgba(249,115,22,.3)}

.jeu-hero-title{font-size:2.5rem;font-weight:900;text-transform:uppercase;letter-spacing:-.03em;line-height:1;margin-bottom:1.5rem;max-width:600px;opacity:0;transition:opacity .5s ease,transform .5s cubic-bezier(0.22, 1, 0.36, 1);transform:translateX(-30px)}

@media(min-width:1024px){.jeu-hero-title{font-size:5rem;max-width:800px}}

.meta{display:flex;flex-wrap:wrap;align-items:center;gap:1.5rem;margin-bottom:2rem;font-size:14px;font-weight:600;color:var(--w40);opacity:0;transition:opacity .5s ease,transform .5s cubic-bezier(0.22, 1, 0.36, 1);transform:translateY(20px)}
.meta.visible{opacity:1;transform:translateY(0)}
.meta-item{display:flex;align-items:center;gap:.5rem;transition:all .3s ease}
.meta-item:hover{transform:translateY(-2px);color:#fff}

.actions{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:2rem}
.btn-primary{display:flex;align-items:center;gap:.75rem;padding:1rem 2rem;background:linear-gradient(135deg,var(--orange) 0%,#ea580c 100%);color:#fff;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;border-radius:1rem;transition:all .25s;box-shadow:0 10px 40px rgba(249,115,22,.3)}
.btn-primary:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 20px 60px rgba(249,115,22,.5);animation:pulse 1.5s infinite}
.btn-primary:active{transform:scale(0.98) translateY(0)}

.btn-secondary:hover{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);transform:scale(1.1) rotate(5deg);box-shadow:0 10px 30px rgba(255,255,255,.1)}
.btn-secondary:active{transform:scale(0.95) rotate(0deg)}

.synopsis{max-width:600px;margin-bottom:2rem;opacity:0;transition:opacity .5s ease,transform .5s cubic-bezier(0.22, 1, 0.36, 1);transform:translateY(20px)}

.synopsis p{font-size:1.1rem;line-height:1.8;color:var(--w40);transition:all .3s ease}

.info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;max-width:500px;margin-bottom:2rem}

.info-item{padding:1rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:1rem;transition:all .3s cubic-bezier(0.34, 1.56, 0.64, 1),opacity .5s ease,transform .5s cubic-bezier(0.34, 1.56, 0.64, 1);opacity:0;transform:scale(0.8)}
.info-item.visible{opacity:1;transform:scale(1)}
.info-item:hover{transform:translateY(-8px) scale(1.02);background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.15);box-shadow:0 15px 40px rgba(0,0,0,.3)}

.container{max-width:2000px;margin:0 auto;padding:4rem 1.5rem}

.section{margin-bottom:4rem}

.magnets-grid{display:grid;gap:1rem}

.magnet-card:nth-child(1){animation-delay:0.1s}
.magnet-card:nth-child(2){animation-delay:0.2s}
.magnet-card:nth-child(3){animation-delay:0.3s}
.magnet-card:nth-child(4){animation-delay:0.4s}
.magnet-card:hover{border-color:var(--orange);background:rgba(249,115,22,.1);transform:translateX(10px) scale(1.02);box-shadow:0 15px 40px rgba(249,115,22,.2)}

.magnet-icon{width:48px;height:48px;background:var(--orange-dim);border-radius:1rem;display:flex;align-items:center;justify-content:center;color:var(--orange);flex-shrink:0}
.magnet-info{flex:1;min-width:0}
.magnet-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.magnet-link{font-size:12px;color:var(--w40);font-family:monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.magnet-arrow{color:var(--w40)}

.yt-section{display:flex;align-items:center;gap:1.5rem;padding:2rem;background:linear-gradient(135deg,rgba(249,115,22,.1) 0%,rgba(249,115,22,.05) 100%);border:1px solid rgba(249,115,22,.2);border-radius:1.5rem}
.yt-info{flex:1}
.yt-title{font-size:1.25rem;font-weight:800;margin-bottom:.5rem}
.yt-desc{font-size:14px;color:var(--w40)}
.yt-btn{display:flex;align-items:center;gap:.5rem;padding:1rem 1.5rem;background:#ff0000;color:#fff;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.1em;border-radius:1rem;transition:all .25s;flex-shrink:0}
.yt-btn:hover{background:#cc0000;transform:scale(1.02)}

.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1rem;color:var(--w40)}
.spinner{width:40px;height:40px;border:3px solid rgba(249,115,22,.2);border-top-color:#f97316;border-radius:9999px;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.error{text-align:center;padding:4rem;color:var(--w40)}
.error h2{font-size:2rem;font-weight:900;margin-bottom:1rem;color:#fff}

.not-found{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:2rem}
.not-found h1{font-size:8rem;font-weight:900;background:linear-gradient(135deg,var(--orange) 0%,#ea580c 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1rem}
.not-found p{font-size:1.25rem;color:var(--w40);margin-bottom:2rem}

/* ══════════════════════════════════════════════════════════
   CSS — ADMIN
══════════════════════════════════════════════════════════ */
        body{font-family:Inter,system-ui,-apple-system,sans-serif;background:#000;color:#fff;overflow-x:hidden;-webkit-font-smoothing:antialiased}
        button{font:inherit;border:0;background:none;color:inherit;cursor:pointer}
        textarea,input,select{font:inherit;color:inherit}

            
    /* ─── DEV MODE BANNER ─── */
    .dev-banner{position:fixed;top:0;left:0;right:0;z-index:200;background:#f97316;color:#000;padding:.5rem 1rem;text-align:center;font-weight:700;font-size:.875rem}
    .dev-banner span{background:#000;color:#f97316;padding:.25rem .5rem;border-radius:.25rem;margin-left:.5rem}

    

    /* ─── LAYOUT ─── */
    .page{min-height:100vh;background:#000;padding-top:120px;padding-bottom:3rem;position:relative;overflow-x:hidden}
    .glow{position:fixed;top:20%;left:10%;width:600px;height:600px;border-radius:9999px;background:rgba(249,115,22,.05);filter:blur(150px);pointer-events:none;z-index:0}
    .glow2{position:fixed;bottom:10%;right:10%;width:400px;height:400px;border-radius:9999px;background:rgba(249,115,22,.03);filter:blur(120px);pointer-events:none;z-index:0}
    .wrap{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:0 1.5rem}

    /* ─── EXPORT BAR ─── */
    .export-bar{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
    .export-btn{padding:.75rem 1.5rem;border-radius:1rem;font-weight:700;transition:all .3s;display:flex;align-items:center;gap:.5rem}
    .export-btn.primary{background:#f97316;color:#fff}
    .export-btn.primary:hover{background:#ea580c}
    .export-btn.secondary{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2)}
    .export-btn.secondary:hover{background:rgba(255,255,255,.15)}
    .status-badge{padding:.5rem 1rem;border-radius:9999px;background:rgba(34,197,94,.1);color:#22c55e;font-size:.875rem;font-weight:600;display:flex;align-items:center;gap:.5rem}
    .status-badge.modified{background:rgba(249,115,22,.1);color:#f97316}

    /* ─── MAIN GRID ─── */
    .main-grid{display:grid;grid-template-columns:350px 1fr;gap:1.5rem}
    @media(max-width:1024px){.main-grid{grid-template-columns:1fr}}

    /* ─── LEFT PANEL ─── */
    .left-panel{display:flex;flex-direction:column;gap:1rem}
    .panel-card{padding:1.25rem;border-radius:1rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)}
    .panel-title{font-size:.875rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.4);margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}

    /* ─── GAME SEARCH ─── */
    .search-box{display:flex;gap:.5rem;margin-bottom:1rem;position:relative;align-items:center}
    .search-input{width:100%;padding:.875rem 1rem .875rem 2.75rem;border-radius:1rem;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:.9375rem;transition:all .3s}
    .search-input:focus{outline:none;border-color:#f97316;background:rgba(255,255,255,.08)}
    .search-input::placeholder{color:rgba(255,255,255,.3)}
    .search-icon{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:rgba(255,255,255,.4);pointer-events:none}
    .search-btn{padding:.875rem 1.25rem;border-radius:1rem;background:#f97316;color:#fff;font-size:.875rem;font-weight:600;border:none;cursor:pointer;transition:all .3s;white-space:nowrap;height:fit-content}
    .search-btn:hover{background:#ea580c}
    .search-results{max-height:300px;overflow-y:auto}
    .search-item{padding:.875rem;border-radius:.75rem;display:flex;align-items:center;gap:.875rem;cursor:pointer;transition:all .2s;border:1px solid transparent}
    .search-item:hover{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
    .search-img{width:48px;height:48px;border-radius:.5rem;object-fit:cover;background:rgba(255,255,255,.1)}
    .search-info{flex:1;min-width:0}
    .search-name{font-size:.9375rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .search-meta{font-size:.75rem;color:rgba(255,255,255,.4);margin-top:.25rem}

    /* ─── MAGNET SOURCES ─── */
    .source-list{display:flex;flex-direction:column;gap:.5rem}
    .source-item{display:flex;align-items:center;gap:.75rem;padding:.75rem;border-radius:.75rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);cursor:pointer;transition:all .2s}
    .source-item:hover{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.15)}
    .source-item.active{border-color:#f97316;background:rgba(249,115,22,.1)}
    .source-dot{width:10px;height:10px;border-radius:50%;background:#22c55e}
    .source-dot.offline{background:#ef4444}
    .source-name{font-size:.875rem;font-weight:600}

    /* ─── RECENT GAMES ─── */
    .recent-list{display:flex;flex-direction:column;gap:.5rem;max-height:400px;overflow-y:auto}
    .recent-item{display:flex;align-items:center;gap:.75rem;padding:.75rem;border-radius:.75rem;background:rgba(255,255,255,.05);cursor:pointer;transition:all .2s}
    .recent-item:hover{background:rgba(249,115,22,.1)}
    .recent-img{width:40px;height:60px;border-radius:.5rem;object-fit:cover;background:#333}
    .recent-info{flex:1;min-width:0}
    .recent-title{font-size:.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .recent-year{font-size:.75rem;color:rgba(255,255,255,.4)}
    .recent-actions{display:flex;gap:.25rem}
    .recent-btn{width:28px;height:28px;border-radius:.5rem;border:none;background:rgba(255,255,255,.1);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .recent-btn:hover{background:#f97316}
    .recent-btn.delete:hover{background:#ef4444}

    /* ─── ALL GAMES GRID ─── */
    .games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.25rem;max-height:600px;overflow-y:auto;padding-right:.5rem}
    .game-card{position:relative;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:1.5rem;overflow:hidden;transition:all .2s;cursor:pointer}
    .game-card:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);transform:translateY(-2px)}

<!-- ═══════════════════════════════════════════════════════
     UTILITAIRES GLOBAUX (partagés par toutes les pages)
════════════════════════════════════════════════════════ -->
<script>
// ── UTILITAIRES PARTAGÉS ─────────────────────────────────────────────────────
function fd(s){if(!s)return'—';const d=new Date(s);return isNaN(d)?'—':d.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});}
function e(s){if(!s)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function e2(s){return e(s).replace(/&#39;/g,"\\'");}
function sid(s){return s.replace(/[^a-zA-Z0-9]/g,'_');}
function escapeHtml(str){if(!str)return'';return str.toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');}

// ── ROUTEUR SPA ──────────────────────────────────────────────────────────────
let _currentPage = '';
let _pageCleanup = null;  // fonction de nettoyage de la page courante
let _morphing = false;    // flag pour empêcher nav() de gérer l'opacité pendant un morph
let _gamesCache = null;   // cache des jeux pour préchargement (pas de re-parse localStorage)

function nav(page, param) {
  if (page === _currentPage && !param) return;

  const view = document.getElementById('spa-view');
  if (!_morphing) view.style.opacity = '0';

  setTimeout(() => {
    // Nettoyage de l'ancienne page (timers, intervals...)
    if (_pageCleanup) { _pageCleanup(); _pageCleanup = null; }

    // Reset scroll
    window.scrollTo(0, 0);

    // Charger le template
    const tpl = document.getElementById('tpl-' + (page === 'jeu' ? 'jeu' : page));
    if (!tpl) { console.error('Template introuvable:', page); return; }
    view.innerHTML = '';
    view.appendChild(tpl.content.cloneNode(true));

    _currentPage = page;

    // Mettre à jour le lien actif dans le header
    document.querySelectorAll('.nav-a').forEach(el => el.classList.remove('active'));
    const activeNav = document.getElementById('nav-' + page);
    if (activeNav) activeNav.classList.add('active');

    // Cacher/montrer footer sur admin
    document.getElementById('site-footer').style.display = page === 'admin' ? 'none' : '';

    // Lancer l'init de la page
    if (page === 'accueil')   { initAccueil(); }
    if (page === 'catalogue') { initCatalogue(); }
    if (page === 'jeu')       { initJeu(param); }
    if (page === 'admin')     { if(typeof initAdmin==='function') initAdmin(); }

    if (!_morphing) view.style.opacity = '1';
  }, 120);
}

// Effet scroll sur le header
window.addEventListener('scroll', () => {
  document.getElementById('hdr').classList.toggle('scrolled', scrollY > 80);
});

// Escape global
document.addEventListener('keydown', ev => {
  if (ev.key === 'Escape') {
    if (typeof closeSrch === 'function') closeSrch();
    if (typeof closeMod  === 'function') closeMod();
  }
});

// Démarrage
nav('accueil');
</script>

<!-- ═══════════════════════════════════════════════════════
     JS — ACCUEIL
════════════════════════════════════════════════════════ -->
<script>
let ALL=[],hidx=0,hsl=[],htmr=null;

// ── CHARGEMENT ──────────────────────────────────────────────────────────────
async function initAccueil(){
  try{
    // Try localStorage first
    let games = [];
    const localData = localStorage.getItem('crackuzu_games');
    
    if (localData) {
      games = JSON.parse(localData);
      console.log('Loaded', games.length, 'games from localStorage');
    }
    
    // If localStorage empty, fallback to data.json
    if (!games || games.length === 0) {
      const r = await fetch('data.json?t=' + Date.now());
      if (!r.ok) throw new Error(r.status);
      games = await r.json();
      console.log('Loaded', games.length, 'games from data.json');
    }
    
    proc(games);
  }catch(err){
    console.error('Load error:', err);
    document.getElementById('htitle').textContent='Aucun jeu disponible';
    document.getElementById('rrow').innerHTML='<div class="ldr"><span class="ltxt">data.json introuvable</span></div>';
  }
}

// ── NORMALISATION du nouveau format admin ───────────────────────────────────
// Nouveau data.json = tableau plat d'objets :
//   { title, year, category, description, portrait_url, banner_url,
//     ytb_id, magnets[], added_by, added_at }
function proc(raw){
  const arr=Array.isArray(raw)?raw:(raw.games||[]);
  ALL=arr.map((g,i)=>({
    _idx:       i,
    // identifiant stable pour la modal
    id:         g.title||String(i),
    // champs affichés
    name:       g.title||'Sans titre',
    year:       g.year||'',
    categories: Array.isArray(g.categories)?g.categories:[],  // support multiple categories
    description:g.description||'',
    // images
    portrait_url: g.portrait_url||null,
    banner_url:   g.banner_url||null,
    // téléchargement
    magnets:    Array.isArray(g.magnets)?g.magnets:[],
    ytb_id:     g.ytb_id||null,
    // meta
    added_at:   g.added_at||null,
    added_by:   g.added_by||null,
  }));
  // tri : plus récent en premier
  ALL.sort((a,b)=>new Date(b.added_at||0)-new Date(a.added_at||0));
  buildHero();buildRecent();buildCatRows();
}

// ── IMAGES ──────────────────────────────────────────────────────────────────
function portraitImg(g){ return g.portrait_url||null; }
function landscapeImg(g){ return g.banner_url||g.portrait_url||null; }
function heroImg(g){     return g.banner_url||g.portrait_url||null; }

// ── HERO ────────────────────────────────────────────────────────────────────
function buildHero(){
  hsl=ALL.filter(g=>heroImg(g)).slice(0,6);
  if(!hsl.length)hsl=ALL.slice(0,6);
  if(!hsl.length)return;
  document.getElementById('hslides').innerHTML=hsl.map((g,i)=>`
    <div class="slide ${i===0?'active':''}" id="hs${i}">
      ${heroImg(g)
        ?`<img src="${heroImg(g)}" alt="${e(g.name)}" draggable="false" loading="${i===0?'eager':'lazy'}">`
        :`<div style="width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)"></div>`}
    </div>`).join('');
  document.getElementById('hdots').innerHTML=hsl.map((_,i)=>`
    <button class="dot" onclick="gs(${i})"><div class="dot-bar ${i===0?'run':''}" id="db${i}"></div></button>`).join('');
  setHI(0);
  if(hsl.length>1)htmr=setInterval(()=>gs((hidx+1)%hsl.length),8000);
}

function setHI(i){
  const g=hsl[i]; if(!g)return;
  document.getElementById('htitle').textContent=g.name;
  // badge source → catégorie ou année
  document.getElementById('hbsrc').textContent=g.category||g.year||'—';
  const ve=document.getElementById('hver'),sep=document.getElementById('hvsep');
  if(g.year){ve.textContent=g.year;sep.style.display='';}
  else{ve.textContent='';sep.style.display='none';}
  document.getElementById('hsz').textContent=g.category||'';
  document.getElementById('hdt').textContent=fd(g.added_at);
  // bouton hero → premier magnet ou #
  document.getElementById('hmag').href=g.magnets[0]||'#';
}

function gs(i){
  if(i===hidx)return;
  clearInterval(htmr);
  document.getElementById('hs'+hidx)?.classList.remove('active');
  const db=document.getElementById('db'+hidx);
  if(db){db.classList.remove('run');db.style.width='0';}
  hidx=i;
  document.getElementById('hs'+hidx)?.classList.add('active');
  const ndb=document.getElementById('db'+hidx);
  if(ndb){ndb.style.width='0';ndb.classList.remove('run');requestAnimationFrame(()=>requestAnimationFrame(()=>ndb.classList.add('run')));}
  setHI(hidx);
  if(hsl.length>1)htmr=setInterval(()=>gs((hidx+1)%hsl.length),8000);
}

// ── SECTION RÉCENTS (cartes wide) ───────────────────────────────────────────
function buildRecent(){
  const g=ALL.slice(0,24);
  document.getElementById('rcnt').textContent=g.length+' jeux';
  document.getElementById('rrow').innerHTML=g.map(wc).join('');
}

function wc(g){
  const img=landscapeImg(g);
  return`<div class="wc" onclick="morphToJeu(this,'${e2(g.id)}')" style="cursor:pointer">
    <div class="wc-img">
      ${img
        ?`<img src="${img}" alt="${e(g.name)}" loading="lazy">`
        :`<div style="width:100%;height:100%;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);display:flex;align-items:center;justify-content:center;font-size:3rem">🎮</div>`}
      <div class="wc-grad"></div>
    </div>
    <div class="wc-body">
      <div class="wc-name">${e(g.name)}</div>
      <div class="wc-meta">
        ${g.year?`<span>${e(g.year)}</span><span>·</span>`:''}
        ${g.categories?.length?g.categories.map(c=>`<span class="wc-v">${e(c)}</span>`).join(''):''}
        <span>${fd(g.added_at)}</span>
      </div>
    </div>
  </div>`;
}

// ── SECTIONS PAR CATÉGORIE (cartes portrait) ─────────────────────────────────
function buildCatRows(){
  const byCat={};
  ALL.forEach(g=>{
    // Handle multiple categories - put game in each category
    const cats=g.categories?.length?g.categories:['Autre'];
    cats.forEach(k=>{
      if(!byCat[k])byCat[k]=[];
      byCat[k].push(g);
    });
  });
  const cats=Object.keys(byCat).sort();
  let h='';
  cats.forEach(cat=>{
    const gs=byCat[cat];
    const rid='row-'+cat.replace(/\s+/g,'-');
    const slice=gs.slice(0,24);
    if(!slice.length)return;
    h+=`<section class="section" style="padding-top:2.5rem">
      <div class="sw">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
          <h2 class="st">${e(cat)}</h2>
          <span style="font-size:11px;font-weight:700;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.15em">${gs.length} jeux</span>
        </div>
        <div class="row-wrap">
          <button class="ra ra-l" onclick="sl('${rid}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
          <button class="ra ra-r" onclick="sr('${rid}')"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
          <div class="row-track" id="${rid}">${slice.map(pc).join('')}</div>
        </div>
      </div>
    </div></section>`;
  });
  document.getElementById('srcrows').innerHTML=h||'';
}

// ── CARTE PORTRAIT ───────────────────────────────────────────────────────────
function pc(g){
  const img=portraitImg(g);
  return`<div class="pc" onclick="morphToJeu(this,'${e2(g.id)}')" style="cursor:pointer">
    <div class="pc-img">
      ${img?`<img src="${img}" alt="${e(g.name)}" loading="lazy">`:`<div class="pc-noimg">🎮</div>`}
      ${g.year?`<span class="pc-badge">${e(g.year)}</span>`:''}
      <div class="pc-ov"></div>
      <div class="pc-info"><div class="pc-name">${e(g.name)}</div><div class="pc-size">${e(g.categories?.[0]||g.year||'')}</div></div>
    </div>
  </div>`;
}

// ── MODAL ────────────────────────────────────────────────────────────────────
function om(id){
  const g=ALL.find(g=>g.id===id); if(!g)return;

  document.getElementById('mname').textContent=g.name;

  // Image portrait
  const img=portraitImg(g);
  const cv=document.getElementById('mcov'),nc=document.getElementById('mnocov');
  if(img){cv.src=img;cv.style.display='';nc.style.display='none';}
  else{cv.style.display='none';nc.style.display='flex';}

  // Pills : année / catégorie / date ajout
  const v=document.getElementById('mv');
  v.textContent=g.year||'';
  v.style.display=g.year?'':'none';
  document.getElementById('msrc').textContent=g.category||'—';
  document.getElementById('msz').textContent=g.description?g.description.slice(0,60)+(g.description.length>60?'…':''):'—';
  document.getElementById('mdt').textContent=fd(g.added_at);

  // Boutons de téléchargement (un par magnet)
  const mact=document.getElementById('mact');
  if(!g.magnets.length){
    mact.innerHTML=`
      <span class="btn-orange" style="flex:1;justify-content:center;opacity:.4;cursor:default">
        Aucun lien disponible
      </span>
      <button class="btn-ghost" onclick="closeMod()" style="padding:.75rem 1rem">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>`;
  } else if(g.magnets.length===1){
    mact.innerHTML=`
      <a href="${e(g.magnets[0])}" class="btn-orange" style="flex:1;justify-content:center">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="22"/></svg>
        Télécharger avec Hydra
      </a>
      <button class="btn-ghost" onclick="closeMod()" style="padding:.75rem 1rem">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>`;
  } else {
    // Plusieurs magnets → select
    const opts=g.magnets.map((m,i)=>`<option value="${e(m)}">Lien ${i+1}</option>`).join('');
    mact.innerHTML=`
      <div style="display:flex;flex-direction:column;gap:.6rem;flex:1">
        <select id="msrcsel" onchange="document.getElementById('mmag').href=this.value"
          style="background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.15);color:#fff;padding:.5rem .75rem;border-radius:.5rem;font-size:12px;font-weight:700;font-family:Inter,sans-serif;outline:none;cursor:pointer">${opts}</select>
        <a id="mmag" href="${e(g.magnets[0])}" class="btn-orange" style="justify-content:center">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="22"/></svg>
          Télécharger avec Hydra
        </a>
      </div>
      <button class="btn-ghost" onclick="closeMod()" style="padding:.75rem 1rem;align-self:flex-end">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>`;
  }

  document.getElementById('mov').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeMod(){document.getElementById('mov').classList.remove('open');document.body.style.overflow='';}
function movck(ev){if(ev.target===document.getElementById('mov'))closeMod();}

// ── RECHERCHE ────────────────────────────────────────────────────────────────
function openSrch(){document.getElementById('sov').classList.add('open');document.body.style.overflow='hidden';setTimeout(()=>document.getElementById('sinput').focus(),50);}
function closeSrch(){document.getElementById('sov').classList.remove('open');document.body.style.overflow='';document.getElementById('sinput').value='';document.getElementById('sres').innerHTML='';}
function doSrch(q){
  const r=document.getElementById('sres');
  if(!q.trim()){r.innerHTML='';return;}
  const m=ALL.filter(g=>g.name.toLowerCase().includes(q.toLowerCase())).slice(0,12);
  if(!m.length){r.innerHTML=`<div class="sempty">Aucun résultat pour « ${e(q)} »</div>`;return;}
  r.innerHTML=m.map((g,i)=>card(g,i).replace(/onclick="morphToJeu\(this,/, 'onclick="closeSrch();morphToJeu(this,')).join('');
}

function card(g,i=0){
  const img=portraitImg(g);
  const animStyle = i >= 0 ? `animation-delay:${i*0.05}s` : 'opacity:1;transform:none';
  return`<div class="card" onclick="morphToJeu(this,'${e2(g.id)}')" style="cursor:pointer;${animStyle}">
    <div class="card-img">
      ${img?`<img src="${img}" alt="${e(g.name)}" loading="lazy">`:`<div class="card-noimg">🎮</div>`}
      ${g.year?`<div class="card-yr">${e(g.year)}</div>`:''}
      ${g.categories?.length?`<div class="card-cat">${e(g.categories[0])}${g.categories.length>1?'+':''}</div>`:''}
    </div>
  </div>`;
}

// ── NAVIGATION ───────────────────────────────────────────────────────────────
function goNew(e){if(e)e.preventDefault();setTimeout(()=>document.getElementById('rrow')?.closest('.section')?.scrollIntoView({behavior:'smooth'}),100);sn('nR');}
function sn(id){document.querySelectorAll('.nav-a').forEach(el=>el.classList.remove('active'));document.getElementById(id)?.classList.add('active');}
function sl(id){document.getElementById(id)?.scrollBy({left:-800,behavior:'smooth'});}
function sr(id){document.getElementById(id)?.scrollBy({left:800,behavior:'smooth'});}

// ── MORPH TRANSITION ─────────────────────────────────────────────────────────
function morphToJeu(el, gameId) {
  const img = el.querySelector('img');
  if (!img) { nav('jeu', gameId); return; }

  _morphing = true;

  // Précharger l'image hero (utilise le cache, pas de re-parse)
  if (!_gamesCache) {
    try {
      const d = localStorage.getItem('crackuzu_games');
      if (d) _gamesCache = JSON.parse(d);
    } catch(e) {}
  }
  if (_gamesCache) {
    const game = _gamesCache.find(g => g.id == gameId);
    if (game) {
      const heroUrl = game.img || game.image || game.cover || null;
      if (heroUrl) { const p = new Image(); p.src = heroUrl; }
    }
  }

  const rect = img.getBoundingClientRect();
  const clone = document.createElement('div');
  clone.className = 'morph-clone';
  const br = getComputedStyle(img).borderRadius || '0.75rem';
  clone.style.cssText = `left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;height:${rect.height}px;border-radius:${br};`;

  const cloneImg = document.createElement('img');
  cloneImg.src = img.src;
  cloneImg.alt = '';
  cloneImg.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;transition:opacity .5s ease;-webkit-transition:opacity .5s ease;';
  clone.appendChild(cloneImg);
  document.body.appendChild(clone);

  // Forcer le paint initial
  void clone.offsetWidth;

  document.body.classList.add('morph-active');

  nav('jeu', gameId);

  const checkHero = setInterval(() => {
    const heroImg = document.getElementById('heroImg');
    if (heroImg && heroImg.src && heroImg.complete) {
      clearInterval(checkHero);
      clearTimeout(fallbackTimer);
      
      heroImg.style.visibility = 'hidden';

      // Démarrer les transitions juste avant la fin du morph
      setTimeout(() => {
        const els = document.querySelectorAll('.genre,.jeu-hero-title,.meta,.synopsis,.info-item,.actions,.back-btn');
        els.forEach((el, i) => {
          setTimeout(() => el.classList.add('visible'), i * 40);
        });
      }, 500);

      const heroRect = heroImg.getBoundingClientRect();

      // Lancer le morph via left/top/width/height (pas de déformation d'image)
      requestAnimationFrame(() => {
        clone.classList.add('morphing');
        clone.style.left = heroRect.left + 'px';
        clone.style.top = heroRect.top + 'px';
        clone.style.width = heroRect.width + 'px';
        clone.style.height = heroRect.height + 'px';
        clone.style.borderRadius = '0';
        
        // Crossfade des images pendant le morph
        cloneImg.style.opacity = '0';
        const heroCloneImg = document.createElement('img');
        heroCloneImg.src = heroImg.src;
        heroCloneImg.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;opacity:0;transition:opacity .5s ease;-webkit-transition:opacity .5s ease;position:absolute;top:0;left:0;';
        clone.appendChild(heroCloneImg);
        
        requestAnimationFrame(() => {
          heroCloneImg.style.opacity = '1';
        });
      });

      // À la fin du morph, retirer le clone
      const onEnd = () => {
        clone.removeEventListener('transitionend', onEnd);
        clearTimeout(endTimer);
        clone.remove();
        heroImg.style.visibility = 'visible';
        document.body.classList.remove('morph-active');
        _morphing = false;
      };
      clone.addEventListener('transitionend', onEnd);
      // Fallback si transitionend ne fire pas
      const endTimer = setTimeout(onEnd, 900);
    }
  }, 30);

  // Fallback : si l'image hero n'est pas chargée après 1.5s, annuler le morph
  const fallbackTimer = setTimeout(() => {
    clearInterval(checkHero);
    clone.remove();
    document.body.classList.remove('morph-active');
    document.querySelectorAll('.genre,.jeu-hero-title,.meta,.synopsis,.info-item,.actions,.back-btn').forEach(el => el.classList.add('visible'));
    _morphing = false;
  }, 1500);
}

// ── TÉLÉCHARGEMENT HERO ─────────────────────────────────────────────────────
function openHeroDownload(ev){
  ev.preventDefault();
  const g=hsl[hidx];
  if(!g)return;
  const activeSlide = document.querySelector('.slide.active');
  if(activeSlide) morphToJeu(activeSlide, g.id);
  else nav('jeu', g.id);
}



// ── UTILITAIRES ──────────────────────────────────────────────────────────────

// initAccueil appelé par le routeur
</script>
