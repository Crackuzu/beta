<script>
const PPG=60;
let CAT_ALL=[],FIL=[],pg=1,aGenre='all',aSort='new',_cur=null;

async function initCatalogue(){
  try{
    // Try localStorage first (from admin-local.html)
    const localData = localStorage.getItem('crackuzu_games');
    if (localData) {
      const games = JSON.parse(localData);
      catProc(games);
      console.log('📦 Jeux chargés depuis localStorage:', games.length);
      return;
    }

    // Fallback to data.json
    const r=await fetch('data.json?t='+Date.now());
    if(!r.ok)throw new Error(r.status);
    catProc(await r.json());
  }catch(err){
    console.error('Erreur chargement:', err);
    document.getElementById('grid').innerHTML=
      `<div class="empty"><div class="empty-ico">😶</div>
       <div class="empty-ttl">data.json introuvable</div>
       <div class="empty-sub">Vérifie que le fichier est bien à la racine du repo.</div></div>`;
  }
}

function catProc(raw){
  const arr=Array.isArray(raw)?raw:(raw.games||[]);
  CAT_ALL=arr.map((g,i)=>({
    _idx:i,id:g.title||String(i),
    name:g.title||'Sans titre',year:g.year||'',
    categories:Array.isArray(g.categories)?g.categories:[],description:g.description||'',
    portrait_url:g.portrait_url||null,banner_url:g.banner_url||null,
    magnets:Array.isArray(g.magnets)?g.magnets:[],
    ytb_id:g.ytb_id||null,added_at:g.added_at||null,
  }));
  buildGenres();applyFilters();
}

function pImg(g){return g.portrait_url||null;}
function bImg(g){return g.banner_url||g.portrait_url||null;}

/* genres */
function buildGenres(){
  const cats=new Set();
  CAT_ALL.forEach(g=>{
    if(g.categories?.length){
      g.categories.forEach(c=>cats.add(c));
    }
  });
  let h=`<button class="filter-cat-btn active" id="fc_all" onclick="selectCatFromDropdown('all')">Tous</button>`;
  cats.forEach(k=>h+=`<button class="filter-cat-btn" id="fc_${sid(k)}" onclick="selectCatFromDropdown('${e(k)}')">${e(k)}</button>`);
  document.getElementById('filterCats').innerHTML=h;
}
function setGenre(g){
  aGenre=g;
  document.querySelectorAll('.filter-cat-btn').forEach(b=>b.classList.remove('active'));
  if(g==='all'){
    document.getElementById('fc_all')?.classList.add('active');
  }else{
    document.getElementById('fc_'+sid(g))?.classList.add('active');
  }
  pg=1;applyFilters();
}

/* filter dropdown */
function toggleFilterDropdown(){
  const d=document.getElementById('filterDropdown');
  d.classList.toggle('open');
}
function closeFilterDropdown(){
  document.getElementById('filterDropdown')?.classList.remove('open');
}
function clearCategoryFilter(){
  selectCatFromDropdown('all');
}
function selectCatFromDropdown(cat){
  aGenre=cat;
  document.querySelectorAll('.filter-cat-btn').forEach(b=>b.classList.remove('active'));
  if(cat==='all'){
    document.getElementById('fc_all')?.classList.add('active');
  }else{
    document.getElementById('fc_'+sid(cat))?.classList.add('active');
  }
  pg=1;applyFilters();
}

/* sort */
function setSort(s){
  aSort=s;
  document.querySelectorAll('.stab').forEach(b=>b.classList.remove('on'));
  document.getElementById('sort-'+s)?.classList.add('on');
  pg=1;applyFilters();
}

/* filter + sort */
function applyFilters(){
  const q=(document.getElementById('cq')?.value||'').toLowerCase().trim();
  FIL=CAT_ALL.filter(g=>{
    const gm=aGenre==='all'||g.categories?.includes(aGenre);
    const nm=!q||g.name.toLowerCase().includes(q);
    return gm&&nm;
  });
  if(aSort==='new') FIL.sort((a,b)=>new Date(b.added_at||0)-new Date(a.added_at||0));
  else              FIL.sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  pg=1;renderGrid();renderPag();
  document.getElementById('res-count').textContent=FIL.length+' jeu'+(FIL.length>1?'x':'');
}

/* grid */
function renderGrid(){
  const slice=FIL.slice((pg-1)*PPG,pg*PPG),gr=document.getElementById('grid');
  if(!slice.length){
    gr.innerHTML=`<div class="empty"><div class="empty-ico">🎮</div>
      <div class="empty-ttl">Aucun jeu trouvé</div>
      <div class="empty-sub">Essaie un autre genre ou efface le filtre.</div></div>`;
    return;
  }
  // Animation seulement pour les 2 premières lignes (max 12 cartes)
  gr.innerHTML=slice.map((g,i)=>catCard(g,i<12?i:-1)).join('');
}

function catCard(g,i=0){
  const img=pImg(g);
  const animStyle = i >= 0 ? `animation-delay:${i*0.05}s` : 'opacity:1;transform:none';
  return`<div class="card" onclick="morphToJeu(this,'${e2(g.id)}')" style="cursor:pointer;${animStyle}">
    <div class="card-img">
      ${img?`<img src="${e(img)}" alt="${e(g.name)}" loading="lazy">`:`<div class="card-noimg">🎮</div>`}
      ${g.year?`<div class="card-yr">${e(g.year)}</div>`:''}
      ${g.categories?.length?`<div class="card-cat">${e(g.categories[0])}${g.categories.length>1?'+':''}</div>`:''}
    </div>
  </div>`;
}

/* pagination */
function renderPag(){
  const t=Math.ceil(FIL.length/PPG),el=document.getElementById('pag');
  if(t<=1){el.innerHTML='';return;}
  let h=`<button class="pb ${pg===1?'off':''}" onclick="gp(${pg-1})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>`;
  pr(pg,t).forEach(p=>p==='…'?h+=`<span class="pb" style="cursor:default;opacity:.3">…</span>`:h+=`<button class="pb ${p===pg?'cur':''}" onclick="gp(${p})">${p}</button>`);
  h+=`<button class="pb ${pg===t?'off':''}" onclick="gp(${pg+1})"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>`;
  el.innerHTML=h;
}
function pr(c,t){if(t<=7)return Array.from({length:t},(_,i)=>i+1);const r=[];if(c>3){r.push(1);if(c>4)r.push('…');}for(let i=Math.max(1,c-2);i<=Math.min(t,c+2);i++)r.push(i);if(c<t-2){if(c<t-3)r.push('…');r.push(t);}return r;}
function gp(p){const t=Math.ceil(FIL.length/PPG);if(p<1||p>t)return;pg=p;renderGrid();renderPag();window.scrollTo({top:0,behavior:'smooth'});}

/* modal */
function openMod(id){
  const g=CAT_ALL.find(g=>g.id===id);if(!g)return;
  _cur=g;
  document.getElementById('m-title').textContent=g.name;
  let pills='';
  if(g.year)     pills+=`<span class="mp-yr">${e(g.year)}</span>`;
  if(g.categories?.length) pills+=g.categories.map(c=>`<span class="mp-cat">${e(c)}</span>`).join('');
  if(g.added_at) pills+=`<span class="m-sep">·</span><span class="mp-date">Ajouté ${fd(g.added_at)}</span>`;
  document.getElementById('m-pills').innerHTML=pills;
  document.getElementById('m-desc').textContent=g.description||'Aucune description disponible.';

  const mi=document.getElementById('m-img'),mn=document.getElementById('m-noimg');
  const mt=document.getElementById('m-trailer'),mb=document.getElementById('m-ytbtn');
  mt.innerHTML='';mt.style.display='none';
  if(bImg(g)){mi.src=bImg(g);mi.style.display='block';mn.style.display='none';}
  else{mi.style.display='none';mn.style.display='flex';}
  mb.style.display=g.ytb_id?'flex':'none';

  let acts='';
  if(g.ytb_id){
    acts+=`<button class="btn-w" onclick="openTrailer()"><svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M5 5a2 2 0 0 1 3.008-1.728l11.997 6.998a2 2 0 0 1 .003 3.458l-12 7A2 2 0 0 1 5 19z"/></svg>Voir le trailer</button>`;
  } else {
    acts+=`<span class="btn-g" style="opacity:.3;cursor:default;pointer-events:none"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m10 15 5-3-5-3z"/></svg>Pas de trailer</span>`;
  }
  if(g.magnets.length){
    acts+=`<button class="btn-p" onclick="document.getElementById('m-mag-sec').scrollIntoView({behavior:'smooth',block:'nearest'})"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="22"/></svg>Télécharger</button>`;
  }
  document.getElementById('m-actions').innerHTML=acts;

  const ms=document.getElementById('m-mag-sec'),ml=document.getElementById('m-mag-list');
  ms.style.display='block';
  if(g.magnets.length){
    ml.innerHTML=g.magnets.map((m,i)=>`
      <a class="m-mag-item" href="${e(m)}">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="22"/></svg>
        ${g.magnets.length>1?'Source '+(i+1)+' — ':''}Télécharger via Crackuzu
      </a>`).join('');
  } else {
    ml.innerHTML='<div class="m-mag-empty">Aucun lien de téléchargement disponible.</div>';
  }
  document.getElementById('mov').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('modal-box').scrollTop=0;
}

function openTrailer(){
  if(!_cur?.ytb_id)return;
  const mi=document.getElementById('m-img'),mb=document.getElementById('m-ytbtn');
  const mt=document.getElementById('m-trailer');
  mi.style.display='none';mb.style.display='none';
  mt.style.display='block';
  mt.innerHTML=`<iframe src="https://www.youtube.com/embed/${_cur.ytb_id}?autoplay=1&rel=0&modestbranding=1" allow="autoplay;encrypted-media" allowfullscreen></iframe>`;
}
function closeMod(){
  document.getElementById('mov').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('m-trailer').innerHTML='';
  document.getElementById('m-trailer').style.display='none';
  _cur=null;
}

/* search */
function openSrch(){document.getElementById('sov').classList.add('open');document.body.style.overflow='hidden';setTimeout(()=>document.getElementById('sinput').focus(),50);}
function closeSrch(){document.getElementById('sov').classList.remove('open');document.body.style.overflow='';document.getElementById('sinput').value='';document.getElementById('sres').innerHTML='';}
function doSrch(q){
  const r=document.getElementById('sres');
  if(!q.trim()){r.innerHTML='';return;}
  const m=CAT_ALL.filter(g=>g.name.toLowerCase().includes(q.toLowerCase())).slice(0,12);
  if(!m.length){r.innerHTML=`<div class="sempty">Aucun résultat pour « ${e(q)} »</div>`;return;}
  r.innerHTML=m.map((g,i)=>catCard(g,i).replace(/onclick="nav\('jeu',/, 'onclick="closeSrch();nav(\'jeu\',')).join('');
}




// initCatalogue appelé par le routeur

// Close filter dropdown when clicking outside
document.addEventListener('click', function(e){
  const dropdown = document.getElementById('filterDropdown');
  const btn = document.getElementById('filterBtn');
  if(dropdown && btn && !dropdown.contains(e.target) && !btn.contains(e.target)){
    dropdown.classList.remove('open');
  }
});
</script>

<script>
// Récupérer le paramètre d'URL (id ou nom du jeu)
function getGameId() {
  return window._spaGameId || null;
}

// Charger les données du jeu
async function loadGame() {
  const gameId = getGameId();
  
  try {
    // Try localStorage first (from admin-local.html)
    let games = [];
    const localData = localStorage.getItem('crackuzu_games');
    if (localData) {
      games = JSON.parse(localData);
      console.log('📦 Jeux chargés depuis localStorage:', games.length);
    } else {
      // Fallback to data.json
      const res = await fetch('data.json');
      if (!res.ok) throw new Error('Failed to load');
      games = await res.json();
    }
    
    let game;
    if (gameId) {
      // Chercher par ID ou titre
      game = games.find(g => g.id === gameId || g.title === gameId);
    } else {
      // Prendre le premier jeu par défaut
      game = games[0];
    }
    
    if (!game) {
      showNotFound();
      return;
    }
    
    renderGame(game);
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('hero').style.display = 'none';
    document.body.innerHTML = '<div class="error"><h2>Erreur de chargement</h2><p>Impossible de charger les données du jeu.</p></div>';
  }
}

function renderGame(game) {
  // Cacher le loading
  document.getElementById('loading').style.display = 'none';
  document.getElementById('content').style.display = 'block';
  document.getElementById('actions').style.display = 'flex';
  document.getElementById('infoGrid').style.display = 'grid';
  window.scrollTo({top:0,behavior:'instant'});
  
  // Titre
  document.getElementById('gameTitle').textContent = game.title;
  document.title = `CRACKUZU – ${game.title}`;
  
  // Background image
  const heroImg = document.getElementById('heroImg');
  if (game.banner_url) {
    heroImg.src = game.banner_url;
    heroImg.alt = game.title;
  } else if (game.portrait_url) {
    heroImg.src = game.portrait_url;
    heroImg.alt = game.title;
  } else {
    // Gradient fallback
    document.getElementById('heroBg').style.background = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
    heroImg.style.display = 'none';
  }
  
  // Genres/Catégories
  const genresContainer = document.getElementById('genres');
  if (game.categories && Array.isArray(game.categories)) {
    genresContainer.innerHTML = game.categories.map(c => 
      `<span class="genre">${escapeHtml(c)}</span>`
    ).join('');
  }
  
  // Meta infos
  if (game.year) {
    document.getElementById('yearValue').textContent = game.year;
    document.getElementById('yearItem').style.display = 'flex';
  }
  if (game.categories?.length) {
    document.getElementById('catValue').textContent = game.categories.join(', ');
    document.getElementById('catItem').style.display = 'flex';
    document.getElementById('typeValue').textContent = game.categories[0];
  }
  if (game.rating) {
    document.getElementById('ratingValue').textContent = game.rating;
    document.getElementById('rating').style.display = 'flex';
  }
  
  // Description
  document.getElementById('descText').textContent = game.description || 'Aucune description disponible pour ce jeu.';
  
  // Magnets - store for download menu
  window.currentMagnets = game.magnets || [];
  if (game.magnets && game.magnets.length > 0) {
    // Download button opens menu
    document.getElementById('downloadBtn').onclick = () => openDownloadMenu(game);
    
    // Update info grid with size and source
    const firstSource = game.magnets[0];
    const isObject = typeof firstSource === 'object' && firstSource !== null;
    
    // Source name
    const sourceName = isObject ? (firstSource.source || firstSource.name || 'Source') : 'Torrent';
    document.getElementById('sourceValue').textContent = sourceName.length > 15 ? sourceName.substring(0, 15) + '...' : sourceName;
    
    // Size
    const size = isObject ? (firstSource.size || '-') : '-';
    document.getElementById('sizeValue').textContent = size;
    
    // Adjust labels based on source type
    if (firstSource.url && firstSource.url.startsWith('magnet')) {
      document.getElementById('label1').textContent = 'Magnet';
    } else if (isObject && firstSource.type === 'torrent') {
      document.getElementById('label1').textContent = 'Torrent';
    } else {
      document.getElementById('label1').textContent = 'Source';
    }
  } else {
    document.getElementById('downloadBtn').style.display = 'none';
  }
  
  // Trailer button
  if (game.ytb_id) {
    document.getElementById('trailerBtn').style.display = 'flex';
    document.getElementById('trailerBtn').onclick = () => openTrailer(game.ytb_id);
    window.currentYtbId = game.ytb_id;
  } else {
    document.getElementById('trailerBtn').style.display = 'none';
  }
}

function openDownloadMenu(game) {
  const overlay = document.getElementById('downloadModal');
  const box = document.getElementById('downloadBox');
  const list = document.getElementById('downloadList');
  
  // Parse download sources - support magnets, direct links, old/new formats
  const sources = game.magnets || [];
  
  if (sources.length === 0) {
    list.innerHTML = '<div style="padding:2rem;text-align:center;color:#94a3b8">Aucune source de téléchargement disponible</div>';
  } else {
    list.innerHTML = sources.map((source, i) => {
      // Handle both old format (string) and new format (object)
      const isObject = typeof source === 'object' && source !== null;
      const url = isObject ? (source.url || '') : source;
      const size = isObject ? (source.size || '') : '';
      const sourceName = isObject ? (source.source || 'Source') : 'Magnet';
      const displayName = isObject ? (source.name || '') : '';
      // All buttons are orange now - no color differentiation
      
      // For magnets, try to extract name from URL
      let extractedName = '';
      if (url.startsWith('magnet:')) {
        const nameMatch = url.match(/dn=([^&]+)/);
        if (nameMatch) {
          extractedName = decodeURIComponent(nameMatch[1].replace(/\+/g, ' '))
            .replace(/\.torrent$/i, '').replace(/%20/g, ' ');
        }
      }
      
      const finalName = displayName || extractedName || `Source ${i + 1}`;
      
      // Detect source type from name if not specified
      let sourceType = sourceName;
      if (sourceType === 'Source' || sourceType === 'Custom') {
        if (finalName.includes('FitGirl')) sourceType = 'FitGirl Repack';
        else if (finalName.includes('DODI')) sourceType = 'DODI Repack';
        else if (finalName.includes('OnlineFix')) sourceType = 'OnlineFix';
        else if (finalName.includes('SteamRIP')) sourceType = 'SteamRIP';
        else sourceType = 'Source de téléchargement';
      }
      
      // Icon based on type
      let iconSvg;
      if (url.startsWith('magnet')) {
        iconSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>';
      } else {
        iconSvg = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="m7 10 5 5 5-5"/><path d="M12 15V3"/></svg>';
      }
      
      // All buttons are orange now
      const btnGradient = 'linear-gradient(135deg,#f97316 0%,#ea580c 100%)';

    // Encode UTF-8 string to base64
    function utf8ToBase64(str) {
      const utf8Bytes = new TextEncoder().encode(str);
      const binaryString = Array.from(utf8Bytes, byte => String.fromCharCode(byte)).join('');
      return btoa(binaryString);
    }

    // Decode base64 to UTF-8 string
    function base64ToUtf8(base64) {
      const binaryString = atob(base64.replace(/\s/g, ''));
      const bytes = new Uint8Array(binaryString.length);
      for (let i = 0; i < binaryString.length; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return new TextDecoder().decode(bytes);
    }

        });

          throw new Error(`${putRes.status}: ${error.message || putRes.statusText}`);

    // Fast CORS proxy with fallback
    async function fetchWithProxy(url) {
      const proxies = [
        { name: 'corsproxy', url: `https://corsproxy.io/?${encodeURIComponent(url)}`, parse: 'direct' },
        { name: 'allorigins', url: `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`, parse: 'allorigins' }
      ];

      for (const proxy of proxies) {
        try {
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 8000);

          const res = await fetch(proxy.url, { signal: controller.signal });
          clearTimeout(timeoutId);

          if (!res.ok) continue;

          if (proxy.parse === 'allorigins') {
            const result = await res.json();
            return JSON.parse(result.contents);
          }
          return await res.json();
        } catch (e) {
          console.log(`Proxy ${proxy.name} failed:`, e.message);
          continue;
        }
      }
      throw new Error('All proxies failed');
    }

    async function searchSteam() {
      const query = document.getElementById('steamSearch').value.trim();
      if (!query) return;

      clearTimeout(searchTimeout);
      const thisSearchId = ++currentSearchId;

      searchTimeout = setTimeout(async () => {
        showLoading(true);
        try {
          // Use proxy fallback for Steam API
          const data = await fetchWithProxy(`https://steamcommunity.com/actions/SearchApps/${encodeURIComponent(query)}`);

          // Ignore if a newer search was started
          if (thisSearchId !== currentSearchId) return;

          const container = document.getElementById('steamResults');

          if (!data || !data.length) {
            container.innerHTML = '<div style="padding:1rem;color:rgba(255,255,255,.5);text-align:center">Aucun résultat</div>';
            return;
          }

          container.innerHTML = data.slice(0, 6).map(game => `
            <div class="search-item" onclick="selectSteamGame(${game.appid})">
              <img class="search-img" src="https://cdn.cloudflare.steamstatic.com/steam/apps/${game.appid}/capsule_sm_120.jpg" alt="" onerror="this.style.visibility='hidden'">
              <div class="search-info">
                <div class="search-name">${esc(game.name)}</div>
                <div class="search-meta">AppID: ${game.appid}</div>
              </div>
            </div>
          `).join('');
        } catch (e) {
          // Only show error if this is still the current search
          if (thisSearchId === currentSearchId) {
            console.error('Steam search error:', e);
            showToast('Erreur Steam: ' + e.message, 'error');
          }
        } finally {
          // Only hide loading if this is still the current search
          if (thisSearchId === currentSearchId) {
            showLoading(false);
          }
        }
      }, 300);
    }

    async function selectSteamGame(appid) {
      showLoading(true);
      try {
        // Use proxy fallback for Steam API
        const data = await fetchWithProxy(`https://store.steampowered.com/api/appdetails?appids=${appid}&l=french&cc=FR`);
        const game = data[appid]?.data;
        
        if (!game) {
          showToast('Impossible de charger les détails', 'error');
          return;
        }

        state.steamData = {
          screenshots: game.screenshots?.map(s => s.path_full) || [],
          background: game.background
        };

        document.getElementById('f-title').value = cleanText(game.name);
        document.getElementById('f-year').value = game.release_date?.date?.split('/').pop() || 
                                                   game.release_date?.date?.split(' ').pop() || '';
        document.getElementById('f-desc').value = cleanText(game.short_description || '');
        
        game.genres?.forEach(g => {
          const cat = CONFIG.CATEGORIES.find(c => c.toLowerCase() === g.description.toLowerCase());
          if (cat) state.selectedCategories.add(cat);
        });
        renderCategories();
        
        updateGalleries(appid);
        searchYouTubeTrailer(game.name);
        
        showToast('Données Steam chargées !', 'success');
      } catch (e) {
        console.error('Steam details error:', e);
        showToast('Erreur lors du chargement: ' + e.message, 'error');
      } finally {
        showLoading(false);
      }
    }

    async function handleImageFile(file) {
      showToast('Upload vers Cloudinary...', 'success');
      
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById('uploadPreviewImg').src = e.target.result;
        document.getElementById('uploadPreview').style.display = 'block';
      };
      reader.readAsDataURL(file);
      
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CONFIG.CLOUDINARY_PRESET);
      
      try {
        const res = await fetch(`https://api.cloudinary.com/v1_1/${CONFIG.CLOUDINARY_CLOUD}/image/upload`, {
          method: 'POST',
          body: formData
        });
        
        const data = await res.json();
        
        if (data.secure_url) {
          state.uploadedImageUrl = data.secure_url;
          showToast('Image uploadée ! Clique sur "Utiliser comme..."', 'success');
        } else {
          showToast('Erreur upload: ' + (data.error?.message || 'Unknown'), 'error');
        }
      } catch (e) {
        showToast('Erreur upload Cloudinary', 'error');
      }
    }

    function setupPasteListener() {
      const uploadZone = document.getElementById('uploadZone');
      
      document.addEventListener('paste', (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            const file = item.getAsFile();
            if (file) {
              uploadZone.classList.add('pasting');
              setTimeout(() => uploadZone.classList.remove('pasting'), 500);
              handleImageFile(file);
            }
          }
        }
      });
    }

    function extractYoutubeId(url) {
      if (!url) return '';
      if (url.length === 11 && !url.includes('/')) return url;
      const match = url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/);
      return match ? match[1] : url;
    }

    async function searchYouTubeAPI(query) {
      const instances = [
        'https://iv.datura.network',
        'https://iv.melmac.space',
        'https://iv.nboeck.de',
        'https://yt.artemislena.eu'
      ];
      
      for (const base of instances) {
        try {
          const controller = new AbortController();
          const timeout = setTimeout(() => controller.abort(), 5000);
          
          const res = await fetch(`${base}/api/v1/search?q=${encodeURIComponent(query)}&type=video`, {
            signal: controller.signal
          });
          clearTimeout(timeout);
          
          if (res.ok) {
            const data = await res.json();
            return data.slice(0, 5).map(v => ({
              id: v.videoId,
              title: v.title,
              author: v.author
            }));
          }
        } catch (e) {
          console.log(`Instance ${base} failed:`, e.message);
        }
      }
      return [];
    }

    async function uploadTorrentWithProxy(input) {
      const file = input.files[0];
      if (!file) return;
      
      const status = document.getElementById('torrentUploadStatus');
      status.textContent = '⏳ Upload via proxy...';
      
      // Try litterbox directly first (has CORS enabled)
      try {
        status.textContent = '⏳ Upload sur Litterbox...';
        
        const formData = new FormData();
        formData.append('reqtype', 'fileupload');
        formData.append('fileToUpload', file);
        formData.append('time', '72h');
        
        const response = await fetch('https://litterbox.catbox.moe/resources/internals/api.php', {
          method: 'POST',
          body: formData
        });
        
        if (response.ok) {
          const url = await response.text();
          if (url && url.startsWith('http')) {
            document.getElementById('m-url').value = url.trim();
            document.getElementById('m-name').value = file.name.replace('.torrent', '');
            document.getElementById('m-type').value = 'torrent';
            status.textContent = '✅ Upload réussi sur Litterbox !';
            showToast('Fichier uploadé !', 'success');
            input.value = '';
            return;
          }
        }
      } catch (e) {
        console.warn('Litterbox failed:', e);
      }
      
      // Fallback: try with corsproxy.io for catbox
      try {
        status.textContent = '⏳ Essai avec Catbox+proxy...';
        await new Promise(r => setTimeout(r, 1000));
        
        const formData = new FormData();
        formData.append('reqtype', 'fileupload');
        formData.append('fileToUpload', file);
        
        const response = await fetch('https://corsproxy.io/?https://catbox.moe/user/api.php', {
          method: 'POST',
          body: formData
        });
        
        if (response.ok) {
          const url = await response.text();

            document.getElementById('m-name').value = file.name.replace('.torrent', '');
            document.getElementById('m-type').value = 'torrent';
            status.textContent = '✅ Upload réussi sur Catbox !';
            showToast('Fichier uploadé !', 'success');
            input.value = '';
            return;
          }
        }
      } catch (e) {
        console.warn('Catbox proxy failed:', e);
      }
      
      status.textContent = '❌ Upload échoué';
      showToast('Upload auto échoué. Utilise catbox.me manuellement.', 'error');

    // HYDRA SOURCES - All sources auto-search (no single source selection)
    // ═══════════════════════════════════════════════════════════
    const sourceCache = {};
    let lastSearchResults = []; // Store results to avoid re-searching when adding

    async function searchAllSources() {
      const title = document.getElementById('f-title').value.trim();
      if (!title) {
        showToast('Entre un titre de jeu d\'abord', 'error');
        return;
      }

      // Auto-switch to magnets tab
      switchTab('magnets');

      const container = document.getElementById('sourceResults');
      const status = document.getElementById('sourceStatus');
      
      container.style.display = 'block';
      container.innerHTML = `
        <div style="padding:2rem;text-align:center">
          <div style="font-size:1.5rem;margin-bottom:.5rem">⏳</div>
          <div style="color:rgba(255,255,255,.5)">Chargement des sources...</div>
        </div>
      `;
      status.textContent = 'Chargement des 4 sources...';

      const allResults = [];
      const sourceKeys = Object.keys(CONFIG.SOURCES);
      let loadedCount = 0;

      // Load all sources in parallel
      await Promise.all(sourceKeys.map(async (key) => {
        try {
          let rawData = sourceCache[key];
          if (!rawData) {
            // Use CORS proxy to access GitHub raw files
            const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(CONFIG.SOURCES[key].url)}`;
            const res = await fetch(proxyUrl);
            if (!res.ok) throw new Error('Failed');
            rawData = await res.json();
            sourceCache[key] = rawData;
          }

          // Parse different JSON structures (array, data.list, data.games, etc.)
          let data = [];
          if (Array.isArray(rawData)) {
            data = rawData;
          } else if (rawData.list && Array.isArray(rawData.list)) {
            data = rawData.list;
          } else if (rawData.games && Array.isArray(rawData.games)) {
            data = rawData.games;
          } else if (rawData.data && Array.isArray(rawData.data)) {
            data = rawData.data;
          } else if (typeof rawData === 'object') {
            const arrProp = Object.values(rawData).find(v => Array.isArray(v));
            if (arrProp) data = arrProp;
          }

          console.log(`[${key}] Loaded ${data.length} games, searching for "${title}"`);
          const matches = searchInSource(data, title);
          console.log(`[${key}] Found ${matches.length} matches`);
          matches.forEach(m => {
            allResults.push({ ...m, sourceKey: key, sourceName: CONFIG.SOURCES[key].name, sourceIcon: CONFIG.SOURCES[key].icon });
          });
          
          loadedCount++;
          status.textContent = `Chargé ${loadedCount}/${sourceKeys.length} sources • ${allResults.length} résultats trouvés`;
        } catch (e) {
          console.error(`[${key}] Failed to load:`, e);
          loadedCount++;
          status.textContent = `Chargé ${loadedCount}/${sourceKeys.length} sources • Erreur sur ${key}`;
          showToast(`Erreur sur ${key}: ${e.message}`, 'error');
        }
      }));

      // Store results globally for adding
      lastSearchResults = allResults;
      displayAllSourceResults(allResults);
      status.textContent = `${allResults.length} résultats trouvés`;
    }

    function searchInSource(data, query) {
      const searchName = query.toLowerCase().trim();
      const results = [];
      
      for (const item of data) {
        const gameTitle = (item.title || item.name || '').toLowerCase();
        
        // Direct includes - strict match
        if (gameTitle.includes(searchName) || searchName.includes(gameTitle)) {
          results.push(item);
          continue;
        }
        
        // Word-based matching (only if more than 2 chars)
        const searchWords = searchName.split(/[\s:\-\.]+/).filter(w => w.length > 2);
        const titleWords = gameTitle.split(/[\s:\-\.]+/).filter(w => w.length > 2);
        
        const matchCount = searchWords.filter(sw => 
          titleWords.some(tw => tw.includes(sw) || sw.includes(tw))
        ).length;
        
        // More flexible: require most words to match (not all)
        // 1 word = must match
        // 2 words = both must match (100%)
        // 3+ words = at least 2/3 or 3/4 must match (75%)
        const requiredMatches = searchWords.length <= 2 
          ? searchWords.length 
          : Math.ceil(searchWords.length * 0.75);
        
        if (matchCount >= requiredMatches && searchWords.length > 0) {
          results.push(item);
        }
      }
      return results.slice(0, 10);
    }

    function displayAllSourceResults(results) {
      const container = document.getElementById('sourceResults');
      container.style.display = 'block';
      
      if (!results.length) {
        container.innerHTML = `
          <div style="padding:3rem 2rem;text-align:center;color:rgba(255,255,255,.5)">
            <div style="font-size:3rem;margin-bottom:1rem">😕</div>
            <div style="font-size:1.1rem;font-weight:600;margin-bottom:.5rem">Aucun résultat</div>
            <div style="font-size:.875rem;margin-bottom:1rem">Le jeu n'a pas été trouvé dans les sources Hydra.</div>
            <div style="font-size:.75rem;opacity:.7;background:rgba(255,255,255,.1);padding:.75rem 1rem;border-radius:.5rem;display:inline-block">
              💡 <b>Conseil:</b> Ouvre la console (F12) pour voir les détails du chargement<br>
              ou essaie avec un titre plus simple (sans ' : -)
            </div>
          </div>
        `;
        return;
      }

      // Group by source
      const bySource = {};
      results.forEach(r => {
        if (!bySource[r.sourceKey]) bySource[r.sourceKey] = [];
        bySource[r.sourceKey].push(r);
      });

      let html = '';
      Object.keys(bySource).forEach(sourceKey => {
        const source = CONFIG.SOURCES[sourceKey];
        const items = bySource[sourceKey];
        
        html += `
          <div class="source-group">
            <div class="source-group-title">${source.icon} ${source.name} (${items.length})</div>
        `;
        
        html += items.map((game, idx) => {
          const title = game.title || game.name || 'Sans titre';
          const size = game.size || game.fileSize || '';
          const version = game.version || '';
          const repack = game.repack || '';
          const linkCount = game.uris?.length || 1;
          const uniqueId = `${sourceKey}-${idx}`;
          
          return `
            <div class="source-result-item" onclick="addAllSourceMagnet('${sourceKey}', ${idx})">
              <div class="source-icon">${source.icon}</div>
              <div class="info">
                <div class="name">${esc(title)}</div>
                <div class="meta">
                  ${size ? `<span class="size">💾 ${esc(size)}</span>` : ''}
                  ${version ? `<span>📦 ${esc(version)}</span>` : ''}
                  ${repack ? `<span>🔧 ${esc(repack)}</span>` : ''}
                  ${linkCount > 1 ? `<span style="color:var(--accent)">🔗 ${linkCount} liens</span>` : ''}
                </div>
              </div>
              <button class="add-btn" onclick="event.stopPropagation();addAllSourceMagnet('${sourceKey}', ${idx})" title="Ajouter">+</button>
            </div>
          `;
        }).join('');
        
        html += '</div>';
      });

      container.innerHTML = html;
    }

    function addAllSourceMagnet(sourceKey, idx) {
      // Get results for this specific source from last search
      const sourceResults = lastSearchResults.filter(r => r.sourceKey === sourceKey);
      
      if (idx >= sourceResults.length) {
        console.error('Index out of bounds', sourceKey, idx, sourceResults.length);
        return;
      }
      
      const game = sourceResults[idx];
      console.log('Adding magnet from', sourceKey, 'game:', game);
      
      // Hydra sources use 'uris' array, check multiple property names
      let url = '';
      if (game.uris && Array.isArray(game.uris) && game.uris.length > 0) {
        url = game.uris[0]; // Take first URI from array
      } else {
        url = game.magnet || game.url || game.link || game.download || game.torrent || game.file || game.uri || '';
      }
      console.log('URL found:', url, 'from properties:', Object.keys(game));
      
      const magnet = {
        url: url,
        name: game.title || game.name || game.game || CONFIG.SOURCES[sourceKey].name,
        size: game.size || game.fileSize || game.file_size || '',
        type: url.startsWith('magnet') ? 'magnet' : (url.startsWith('http') ? 'direct' : 'torrent'),
        source: CONFIG.SOURCES[sourceKey].name
      };
      
      if (!magnet.url) {
        showToast('Pas de lien disponible - vérifie console (F12)', 'error');
        return;
      }
      
      state.selectedMagnets.push(magnet);
      renderMagnets();
      showToast(`✅ Ajouté depuis ${magnet.source}`, 'success');
    }

    // ═══════════════════════════════════════════════════════════
    // CATEGORIES
    // ═══════════════════════════════════════════════════════════
    function renderCategories() {
      const grid = document.getElementById('categoryGrid');
      grid.innerHTML = CONFIG.CATEGORIES.map(c => `
        <div class="category-chip ${state.selectedCategories.has(c) ? 'active' : ''}" onclick="toggleCategory('${c}')">
          ${c}
        </div>
      `).join('');
    }

    function toggleCategory(cat) {
      if (state.selectedCategories.has(cat)) {
        state.selectedCategories.delete(cat);
      } else {
        state.selectedCategories.add(cat);
      }
      renderCategories();
    }

    // ═══════════════════════════════════════════════════════════
    // RECENT GAMES
    // ═══════════════════════════════════════════════════════════
    function displayRecentGames() {
      const container = document.getElementById('recentGames');
      const games = state.games || [];
      
      document.getElementById('gameCount').textContent = games.length;
      
      if (!games.length) {
        container.innerHTML = '<div style="padding:1rem;text-align:center;color:rgba(255,255,255,.4)">Aucun jeu</div>';
        return;
      }
      
      container.innerHTML = games.slice(-20).reverse().map((game, idx) => {
        const realIdx = games.length - 1 - idx;
        return `
          <div class="recent-item" onclick="editGame(${realIdx})">
            <img class="recent-img" src="${esc(game.portrait_url || '')}" onerror="this.style.display='none'">
            <div class="recent-info">
              <div class="recent-title">${esc(game.title)}</div>
              <div class="recent-year">${esc(game.year || 'N/A')}</div>
            </div>
            <div class="recent-actions" onclick="event.stopPropagation()">
              <button class="recent-btn" onclick="editGame(${realIdx})" title="Modifier">✏️</button>
              <button class="recent-btn delete" onclick="deleteGame(${realIdx})" title="Supprimer">🗑️</button>
            </div>
          </div>
        `;
      }).join('');
    }

    async function editGame(idx) {
      const game = state.games[idx];
      if (!game) return;
      
      editingGameIndex = idx;
      
      document.getElementById('f-title').value = game.title || '';
      document.getElementById('f-year').value = game.year || '';
      document.getElementById('f-desc').value = game.description || '';
      document.getElementById('f-ytb').value = game.ytb_id || '';
      document.getElementById('f-portrait').value = game.portrait_url || '';
      document.getElementById('f-banner').value = game.banner_url || '';
      
      state.selectedPortrait = game.portrait_url || '';
      state.selectedBanner = game.banner_url || '';
      state.selectedCategories = new Set(game.categories || []);
      state.selectedMagnets = game.magnets || [];

      renderCategories();
      renderMagnets();
      await loadExistingImages(game);
      
      document.getElementById('formTitleIcon').textContent = '✏️';
      document.getElementById('formTitleText').textContent = 'Modifier jeu';
      document.getElementById('deleteBtn').style.display = 'flex';

      // Scroll vers le formulaire d'édition
      window.scrollTo({ top: 0, behavior: 'smooth' });

      showToast('Jeu chargé pour modification', 'success');
    }

    function deleteGame(idx) {
      if (!confirm('Supprimer ce jeu ?')) return;
      
      state.games.splice(idx, 1);
      localStorage.setItem('crackuzu_games', JSON.stringify(state.games));
      state.isModified = true;
      updateStatusBadge();
      
      displayRecentGames();
      showToast('Jeu supprimé', 'success');
      
      if (editingGameIndex === idx) {
        clearForm();
      }
    }

    // ═══════════════════════════════════════════════════════════
    // ALL GAMES GRID
    // ═══════════════════════════════════════════════════════════
    function displayAllGames() {
      const container = document.getElementById('allGamesGrid');
      const games = state.games || [];

      document.getElementById('allGamesCount').textContent = games.length;

      if (!games.length) {
        container.innerHTML = '<div style="padding:2rem;text-align:center;color:rgba(255,255,255,.4);grid-column:1/-1">Aucun jeu</div>';
        return;
      }

      container.innerHTML = games.map((game, idx) => `
        <div class="game-card" data-title="${esc(game.title || '').toLowerCase()}" data-idx="${idx}">
          <img class="game-card-img" src="${esc(game.portrait_url || '')}" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22><rect fill=%22%23333%22/></svg>'">
          <div class="game-card-overlay">
            <button class="game-card-btn" onclick="event.stopPropagation();editGame(${idx})" title="Modifier">✏️ Modifier</button>
            <button class="game-card-btn delete" onclick="event.stopPropagation();deleteGameFromCard(${idx})" title="Supprimer">🗑️ Supprimer</button>
          </div>
          <div class="game-card-info">
            <div class="game-card-title" title="${esc(game.title || '')}">${esc(game.title || 'Sans titre')}</div>
            <div class="game-card-year">${esc(game.year || 'N/A')} • ${esc(game.categories?.[0] || 'Sans catégorie')}</div>
          </div>
        </div>
      `).join('');
    }

    function filterGames() {
      const searchTerm = document.getElementById('gamesSearch').value.toLowerCase().trim();
      const cards = document.querySelectorAll('.game-card');

      cards.forEach(card => {
        const title = card.getAttribute('data-title');
        if (searchTerm === '' || title.includes(searchTerm)) {
          card.classList.remove('hidden');
        } else {
          card.classList.add('hidden');
        }
      });
    }

    function deleteGameFromCard(idx) {
      if (!confirm('Supprimer ce jeu ?')) return;

      state.games.splice(idx, 1);
      localStorage.setItem('crackuzu_games', JSON.stringify(state.games));
      state.isModified = true;
      updateStatusBadge();

      displayRecentGames();
      displayAllGames();
      showToast('Jeu supprimé', 'success');

      if (editingGameIndex === idx) {
        clearForm();
      }
    }

    // ═══════════════════════════════════════════════════════════
    // FORM
    // ═══════════════════════════════════════════════════════════
    function clearForm() {
      editingGameIndex = -1;
      state.selectedCategories.clear();
      state.selectedMagnets = [];
      state.selectedPortrait = '';
      state.selectedBanner = '';
      state.steamData = {};
      state.uploadedImageUrl = '';
      
      document.getElementById('f-title').value = '';
      document.getElementById('f-year').value = '';
      document.getElementById('f-desc').value = '';
      document.getElementById('f-ytb').value = '';
      document.getElementById('f-portrait').value = '';
      document.getElementById('f-banner').value = '';
      document.getElementById('steamSearch').value = '';
      document.getElementById('steamResults').innerHTML = '';
      document.getElementById('portraitGallery').innerHTML = '';
      document.getElementById('bannerGallery').innerHTML = '';
      document.getElementById('uploadPreview').style.display = 'none';
      document.getElementById('uploadPreviewImg').src = '';
      document.getElementById('m-url').value = '';
      document.getElementById('m-name').value = '';
      document.getElementById('m-size').value = '';
      
      document.getElementById('formTitleIcon').textContent = '➕';
      document.getElementById('formTitleText').textContent = 'Nouveau jeu';
      document.getElementById('deleteBtn').style.display = 'none';
      
      renderCategories();
      renderMagnets();
      switchTab('infos');
    }

    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(`tab-btn-${tab}`).classList.add('active');
      
      document.getElementById('tab-infos').style.display = tab === 'infos' ? 'block' : 'none';
      document.getElementById('tab-images').style.display = tab === 'images' ? 'block' : 'none';
      document.getElementById('tab-magnets').style.display = tab === 'magnets' ? 'block' : 'none';
    }

    // ═══════════════════════════════════════════════════════════
    // UTILS
    // ═══════════════════════════════════════════════════════════
    function esc(str) {
      if (!str) return '';
      return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }

    function showToast(msg, type = 'success') {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.className = `toast ${type} show`;
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function showLoading(show) {
      document.getElementById('loading').classList.toggle('show', show);
    }

    // Header scroll effect
    window.addEventListener('scroll', () => {
      document.getElementById('header').classList.toggle('scrolled', window.scrollY > 50);
    });
</script>
